<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Weekends – The Annals – Slingshot Engaged</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #c0392b;
      --red-bright: #e74c3c;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --surface3: #242424;
      --text: #f0f0f0;
      --muted: #bbb;
      --label: #d8d8d8;
      --text-body: #e8e8e8;
      --border: #2a2a2a;
      --gold: #c9a84c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── Page Header ── */
    .page-header {
      padding: 40px 20px 0;
      text-align: center;
    }
    .page-supertitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #d0d0d0;
      margin-bottom: 6px;
    }
    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      color: var(--red-bright);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
    }
    .page-subtitle {
      font-family: 'Barlow', sans-serif;
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .page-updated {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Commissioner mode button ── */
    .commish-wrap {
      text-align: center;
      margin-top: 14px;
    }
    .commish-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--label);
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .commish-btn:hover { border-color: var(--red); color: var(--text); }
    .commish-btn.active { border-color: var(--red); color: var(--red-bright); }

    /* ── Weekend cards ── */
    .weekends-wrap {
      max-width: 680px;
      margin: 28px auto 60px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .weekend-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    /* Per-card accent colors */
    .weekend-card[data-color="0"] { border-color: #e74c3c; }  /* red        – Iron Mansion 2026 */
    .weekend-card[data-color="1"] { border-color: #3498db; }  /* blue       – Twin Cities 2025 */
    .weekend-card[data-color="2"] { border-color: #e67e22; }  /* orange     – Texas Hill Country 2024 */
    .weekend-card[data-color="3"] { border-color: #9b59b6; }  /* purple     – Nashville 2023 */
    .weekend-card[data-color="4"] { border-color: #c9a84c; }  /* gold       – Sacramento 2022 */
    .weekend-card[data-color="5"] { border-color: #1abc9c; }  /* teal       – Deep Creek 2021 */
    .weekend-card[data-color="6"] { border-color: #7f8c8d; }  /* slate      – Virtual Draft 2020 */
    .weekend-card[data-color="7"] { border-color: #e91e8c; }  /* pink       – Denver IV 2019 */
    .weekend-card[data-color="8"] { border-color: #27ae60; }  /* green      – Denver III 2018 */
    .weekend-card[data-color="9"] { border-color: #00bcd4; }  /* cyan       – Denver II 2017 */
    .weekend-card[data-color="10"] { border-color: #f1c40f; } /* yellow     – Denver I 2016 */

    .weekend-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .weekend-year {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--red-bright);
      line-height: 1;
    }
    .weekend-location {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bbb;
    }

    /* ── Memories list ── */
    .memories-list {
      padding: 0;
    }
    .memory-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }
    .memory-item:last-of-type { border-bottom: none; }
    .memory-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--surface3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    .memory-body { flex: 1; min-width: 0; }
    .memory-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .memory-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }
    .memory-time {
      font-size: 0.72rem;
      color: var(--label);
      letter-spacing: 0.04em;
    }
    .memory-text {
      font-size: 0.92rem;
      line-height: 1.55;
      color: #e8e8e8;
    }
    .memory-delete {
      display: none;
      background: none;
      border: none;
      color: var(--red);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .memory-delete:hover { background: rgba(192,57,43,0.15); }
    body.commish-mode .memory-delete { display: block; }

    /* ── Empty state ── */
    .memories-empty {
      padding: 20px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      color: var(--label);
      font-style: italic;
      text-align: center;
    }

    /* ── Add memory form ── */
    .add-memory-wrap {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      background: var(--surface2);
    }
    .add-memory-toggle {
      width: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-memory-toggle:hover { border-color: var(--red); color: var(--text); }

    .add-memory-form {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
    .add-memory-form.open { display: flex; }

    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .name-input {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      list-style: none;
    }
    .name-input:focus { border-color: var(--red); }

    .name-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .name-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .name-chip:hover { border-color: var(--red); color: var(--text); }

    .memory-textarea {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 10px 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .memory-textarea:focus { border-color: var(--red); }
    .memory-textarea::placeholder { color: var(--muted); }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn-cancel {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-submit {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      background: var(--red);
      border: 1px solid var(--red);
      border-radius: 6px;
      color: #fff;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--red-bright); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading spinner ── */
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <script src="../nav.js"></script>

  <div class="page-header">
    <div class="page-supertitle">The Annals of History</div>
    <h1>League Weekends</h1>
    <p class="page-updated" id="lastUpdated"></p>
  </div>

  <div class="commish-wrap">
    <button class="commish-btn" id="commishBtn" onclick="toggleCommishMode()">⚙ Commissioner Mode</button>
  </div>

  <div class="weekends-wrap" id="weekendsWrap">
    <div class="loading">Loading memories...</div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, onValue, remove, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ── FIREBASE CONFIG ────────────────────────────────────────────────────
    // Replace with your actual Firebase project config
    const firebaseConfig = {
      apiKey: "AIzaSyDJHrXrUx3d4nKcoDarbT3So4-WCJopiss",
      authDomain: "slingshot-engaged.firebaseapp.com",
      databaseURL: "https://slingshot-engaged-default-rtdb.firebaseio.com",
      projectId: "slingshot-engaged",
      storageBucket: "slingshot-engaged.firebasestorage.app",
      messagingSenderId: "391315870953",
      appId: "1:391315870953:web:daf00bdb40ee414f564c78"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ── COMMISSIONER PASSCODE ──────────────────────────────────────────────
    const COMMISH_CODE = 'slingshot';  // change to whatever you want

    window.toggleCommishMode = function() {
      if (document.body.classList.contains('commish-mode')) {
        document.body.classList.remove('commish-mode');
        document.getElementById('commishBtn').classList.remove('active');
        return;
      }
      const code = prompt('Commissioner code:');
      if (code === COMMISH_CODE) {
        document.body.classList.add('commish-mode');
        document.getElementById('commishBtn').classList.add('active');
      } else if (code !== null) {
        alert('Wrong code.');
      }
    };

    // ── WEEKEND DEFINITIONS ────────────────────────────────────────────────
    // Add/edit years and locations here. Most recent first.
    const WEEKENDS = [
      { id: 'w2026', year: '2026', location: 'Iron Mansion' },
      { id: 'w2025', year: '2025', location: 'Twin Cities' },
      { id: 'w2024', year: '2024', location: 'Texas Hill Country' },
      { id: 'w2023', year: '2023', location: 'Nashville' },
      { id: 'w2022', year: '2022', location: 'Sacramento' },
      { id: 'w2021', year: '2021', location: 'Deep Creek' },
      { id: 'w2020', year: '2020', location: 'Virtual Draft' },
      { id: 'w2019', year: '2019', location: 'Denver IV: Brunch, Puke & Rally' },
      { id: 'w2018', year: '2018', location: 'Denver III: Rocky Mtn Showdown' },
      { id: 'w2017', year: '2017', location: 'Denver II: First Sticker Draft' },
      { id: 'w2016', year: '2016', location: 'Denver I: The Mud Run' },
    ];

    const OWNERS = ['Alex','Andy','Brian','Daniel','Dylan','Jack','Jordan','Kyle','Luke','Matt','Mike','Scott','Tim','Wade'];

    // ── HELPERS ────────────────────────────────────────────────────────────
    function initials(name) {
      return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    }

    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(ts).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    // ── BUILD PAGE ─────────────────────────────────────────────────────────
    function buildPage() {
      const wrap = document.getElementById('weekendsWrap');
      wrap.innerHTML = '';

      WEEKENDS.forEach((weekend, index) => {
        const card = document.createElement('div');
        card.className = 'weekend-card';
        card.id = `card-${weekend.id}`;
        card.dataset.color = index;
        card.innerHTML = `
          <div class="weekend-header">
            <span class="weekend-year">${weekend.year}</span>
            <span class="weekend-location">${weekend.location}</span>
          </div>
          <div class="memories-list" id="list-${weekend.id}">
            <div class="loading">Loading...</div>
          </div>
          <div class="add-memory-wrap">
            <button class="add-memory-toggle" onclick="toggleForm('${weekend.id}')">+ Add a Memory</button>
            <div class="add-memory-form" id="form-${weekend.id}">
              <input
                class="name-input"
                id="name-${weekend.id}"
                type="text"
                placeholder="Your name"
                autocomplete="off"
                list="owners-list"
              />
              <datalist id="owners-list">
                ${OWNERS.map(o => `<option value="${o}">`).join('')}
              </datalist>
              <div class="name-suggestions">
                ${OWNERS.map(o => `<button class="name-chip" onclick="fillName('${weekend.id}','${o}')">${o}</button>`).join('')}
              </div>
              <textarea
                class="memory-textarea"
                id="text-${weekend.id}"
                placeholder="Share a memory from this weekend..."
              ></textarea>
              <div class="form-actions">
                <button class="btn-cancel" onclick="toggleForm('${weekend.id}')">Cancel</button>
                <button class="btn-submit" id="submit-${weekend.id}" onclick="submitMemory('${weekend.id}')">Post Memory</button>
              </div>
            </div>
          </div>
        `;
        wrap.appendChild(card);

        // Listen for memories in real-time
        const memoriesRef = ref(db, `memories/${weekend.id}`);
        onValue(memoriesRef, snapshot => {
          renderMemories(weekend.id, snapshot.val());
        });
      });
    }

    // ── RENDER MEMORIES ────────────────────────────────────────────────────
    function renderMemories(weekendId, data) {
      const list = document.getElementById(`list-${weekendId}`);
      if (!data) {
        list.innerHTML = `<div class="memories-empty">No memories yet — be the first to post one.</div>`;
        return;
      }

      const entries = Object.entries(data)
        .map(([key, val]) => ({ key, ...val }))
        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

      list.innerHTML = entries.map(entry => `
        <div class="memory-item">
          <div class="memory-avatar">${initials(entry.name || '?')}</div>
          <div class="memory-body">
            <div class="memory-meta">
              <span class="memory-name">${entry.name || 'Anonymous'}</span>
              <span class="memory-time">${timeAgo(entry.timestamp)}</span>
            </div>
            <div class="memory-text">${entry.text || ''}</div>
          </div>
          <button class="memory-delete" onclick="deleteMemory('${weekendId}','${entry.key}')" title="Delete">✕</button>
        </div>
      `).join('');
    }

    // ── FORM TOGGLE ────────────────────────────────────────────────────────
    window.toggleForm = function(weekendId) {
      const form = document.getElementById(`form-${weekendId}`);
      form.classList.toggle('open');
      if (form.classList.contains('open')) {
        document.getElementById(`name-${weekendId}`).focus();
      }
    };

    window.fillName = function(weekendId, name) {
      document.getElementById(`name-${weekendId}`).value = name;
      document.getElementById(`text-${weekendId}`).focus();
    };

    // ── SUBMIT ─────────────────────────────────────────────────────────────
    window.submitMemory = async function(weekendId) {
      const name = document.getElementById(`name-${weekendId}`).value.trim();
      const text = document.getElementById(`text-${weekendId}`).value.trim();
      const btn  = document.getElementById(`submit-${weekendId}`);

      if (!name) { alert('Please enter your name.'); return; }
      if (!text)  { alert('Please write a memory first.'); return; }

      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {
        await push(ref(db, `memories/${weekendId}`), {
          name,
          text,
          timestamp: Date.now()
        });
        document.getElementById(`name-${weekendId}`).value = '';
        document.getElementById(`text-${weekendId}`).value = '';
        document.getElementById(`form-${weekendId}`).classList.remove('open');
      } catch (e) {
        alert('Something went wrong. Try again.');
      }

      btn.disabled = false;
      btn.textContent = 'Post Memory';
    };

    // ── DELETE ─────────────────────────────────────────────────────────────
    window.deleteMemory = async function(weekendId, key) {
      if (!confirm('Delete this memory?')) return;
      await remove(ref(db, `memories/${weekendId}/${key}`));
    };

    // ── LAST UPDATED ───────────────────────────────────────────────────────
    fetch('../profiles-data.json')
      .then(r => r.json())
      .then(data => {
        const date = data.pageUpdates?.['league-weekends'];
        if (date) {
          document.getElementById('lastUpdated').textContent = 'Updated · ' + date;
        }
      })
      .catch(() => {});

    // ── INIT ───────────────────────────────────────────────────────────────
    buildPage();
  </script>
</body>
</html>
