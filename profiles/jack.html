<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack "The Commish" — Slingshot Engaged</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D93B2B;
    --red-dark: #a82d1f;
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --card2: #222222;
    --gray: #2a2a2a;
    --gray-light: #333333;
    --white: #f5f5f5;
    --muted: #888;
    --gold: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 38px,
      rgba(255,255,255,0.018) 38px, rgba(255,255,255,0.018) 40px
    );
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    max-width: 780px;
    margin: 0 auto;
    background: var(--black);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, #1a0a08 0%, var(--black) 100%);
    padding: 36px 20px 0;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(217,59,43,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .owner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 4px;
    color: var(--white);
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .owner-name-nickname {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 3px;
    color: var(--red);
    line-height: 1;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .owner-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .owner-champion {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto;
  }

  .avatar-wrap img {
    width: 240px;
    height: 240px;
    display: block;
    margin: 0 auto;
    object-fit: cover;
    object-position: top;
    border-radius: 50%;
    border: 3px solid var(--red);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.8));
    position: relative;
    z-index: 1;
  }

  .avatar-placeholder {
    width: 240px;
    height: 240px;
    background: var(--card);
    border: 2px dashed #333;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0 auto;
  }

  /* ── LIVE SEASON BANNER ── */
  .live-banner {
    position: relative;
    z-index: 1;
    margin: 28px 20px 0;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px 18px;
  }

  .live-dot {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    flex-shrink: 0;
  }

  .live-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .live-stat { text-align: center; }

  .live-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--white);
    line-height: 1;
  }

  .live-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .live-last-game {
    border-top: 1px solid #222;
    padding-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .last-game-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }

  .last-game-result {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .result-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .result-pill.win { background: #1a3a1a; color: #6aaa6a; border: 1px solid #6aaa6a; }
  .result-pill.loss { background: #3a1a1a; color: #aa6a6a; border: 1px solid #aa6a6a; }

  .last-game-detail {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    color: var(--white);
  }

  .last-game-record {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── PRESTIGE BLOCK ── */
  .prestige-block {
    position: relative;
    z-index: 1;
    margin: 14px 20px 0;
    background: linear-gradient(135deg, #1a1500 0%, #111000 100%);
    border: 1px solid #3a3010;
    border-radius: 8px;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .prestige-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .prestige-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
  }

  .prestige-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--gold);
    line-height: 1;
  }

  .prestige-divider {
    width: 1px;
    background: #3a3010;
    align-self: stretch;
    margin: 0 16px;
  }

  /* ── TRAITS ── */
  .traits-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 20px 0;
  }

  .trait-item {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .trait-icon { font-size: 2.2rem; line-height: 1; flex-shrink: 0; }

  .trait-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.2;
  }

  /* ── QUICK FACTS ── */
  .quick-facts {
    position: relative;
    z-index: 1;
    padding: 18px 20px;
    margin-top: 18px;
  }

  .quick-facts-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 14px;
  }

  .facts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .fact-card {
    background: var(--card);
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .fact-card-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .fact-card-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  /* keep old classes so nothing breaks if referenced */
  .fact-row { display: none; }
  .location-row { display: none; }
  .h2h-bar-wrap { display: none; }
  .h2h-bar { display: none; }
  .h2h-bar-fill { display: none; }
  .h2h-label { display: none; }

  /* ── NARRATIVE ── */
  .narrative-section {
    position: relative;
    z-index: 1;
    padding: 32px 20px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 16px;
  }

  .pull-quote {
    border-left: 3px solid var(--red);
    padding-left: 18px;
    margin-bottom: 20px;
    font-style: italic;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--white);
    line-height: 1.5;
  }

  .narrative-text {
    font-size: 1.05rem;
    line-height: 1.8;
    color: #ccc;
  }

  .narrative-text strong { color: var(--white); font-weight: 600; }

  /* ── CAREER STATS ── */
  .stats-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 16px;
  }

  .stats-bucket { margin-bottom: 20px; }

  .stats-bucket-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a2a2a;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
  }

  .stats-row:nth-child(odd) { background: #1e1e1e; }
  .stats-row:nth-child(even) { background: #1a1a1a; }
  .stats-row:first-child { border-radius: 4px 4px 0 0; }
  .stats-row:last-child { border-radius: 0 0 4px 4px; }

  .stats-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .stats-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    color: #bbb;
    line-height: 1.2;
  }

  .stats-explainer {
    font-family: 'Barlow', sans-serif;
    font-size: 0.75rem;
    font-style: italic;
    color: #555;
    line-height: 1.3;
  }

  .stats-right {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .stats-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--white);
  }

  .stats-val.earnings { color: #6aaa6a; }

  .stats-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold);
  }

  .table-footnote {
    font-family: 'Barlow', sans-serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
  }

  /* ── CAREER TRENDS ── */
  .trends-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .chart-block {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 18px 14px 14px;
    margin-bottom: 16px;
  }

  .chart-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    color: #888;
  }

  .legend-dot {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── SEASON ACCORDION ── */
  .accordion-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .accordion-item {
    margin-bottom: 6px;
    border-radius: 6px;
    overflow: hidden;
  }

  .accordion-trigger {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
  }

  .accordion-item.open .accordion-trigger {
    border-radius: 6px 6px 0 0;
    border-bottom-color: #111;
  }

  .trigger-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .trigger-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--white);
    letter-spacing: 2px;
    line-height: 1;
    flex-shrink: 0;
  }

  .trigger-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .badge-champion { background: var(--gold); color: #000; }
  .badge-finalist { background: #888; color: #000; }
  .badge-playoff { background: #1a3a1a; color: #6aaa6a; border: 1px solid #6aaa6a; }
  .badge-missed { background: #2a1a1a; color: #aa5555; border: 1px solid #aa5555; }
  .badge-bronze { background: #2a1a0a; color: #cd7f32; border: 1px solid #cd7f32; }

  .trigger-snapshot {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
  }

  .snapshot-record {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--white);
    line-height: 1;
  }

  .snapshot-finish {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #666;
  }

  .trigger-chevron {
    font-size: 0.9rem;
    color: #555;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .accordion-item.open .trigger-chevron { transform: rotate(180deg); }

  .accordion-content {
    display: none;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 16px;
  }

  .accordion-item.open .accordion-content { display: block; }

  .acc-bucket { margin-bottom: 16px; }
  .acc-bucket:last-child { margin-bottom: 0; }

  .acc-bucket-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid #2a2a2a;
  }

  .acc-team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    padding: 10px 12px;
    background: #1e1e1e;
    border-radius: 4px;
  }

  .acc-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
  }

  .acc-row:nth-child(odd) { background: #1e1e1e; }
  .acc-row:nth-child(even) { background: #1a1a1a; }
  .acc-row:first-child { border-radius: 4px 4px 0 0; }
  .acc-row:last-child { border-radius: 0 0 4px 4px; }

  .acc-label { color: #888; }
  .acc-val { color: var(--white); font-weight: 700; }
  .acc-val.earnings { color: #6aaa6a; }
  .acc-val.loss { color: #aa5555; }
  .acc-val.bronze { color: #cd7f32; }

  /* ── TROPHY CASE ── */
  .trophy-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .trophy-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 16px;
  }

  .trophy-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .trophy-card {
    border-radius: 8px;
    padding: 16px 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .trophy-card.won {
    background: #1a1a1a;
    border: 1px solid #333;
  }

  .trophy-card.locked {
    background: #111;
    border: 1px solid #2a2a2a;
    opacity: 0.75;
    filter: grayscale(1) brightness(0.7);
  }

  .trophy-images {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 8px;
    justify-content: center;
    align-items: flex-end;
  }

  .trophy-img {
    height: 90px;
    width: auto;
    max-width: 90px;
    object-fit: contain;
    flex-shrink: 0;
    display: block;
  }

  .trophy-lock {
    height: 90px;
    width: 70px;
    background: #181818;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trophy-lock-icon {
    width: 24px;
    height: 28px;
    border: 2px solid #2a2a2a;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trophy-lock-dot {
    width: 8px;
    height: 8px;
    background: #2a2a2a;
    border-radius: 50%;
  }

  .trophy-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.2;
    text-align: center;
  }

  .trophy-card.locked .trophy-name {
    color: #444;
  }

  .trophy-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--gold);
  }

  /* ── SHARE ── */
  .share-wrap {
    position: relative;
    z-index: 1;
    padding: 8px 20px 48px;
    text-align: center;
  }

  .share-btn {
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 16px 32px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    width: 100%;
    justify-content: center;
  }

  .share-btn:hover { border-color: var(--red); color: var(--white); }
  .share-btn.copied { border-color: #6aaa6a; color: #6aaa6a; }

  /* ── FADE IN ── */
  .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* ── LOADING ── */
  #loadingState {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="page-wrap">

  <div id="loadingState">Loading...</div>
  <div id="profileContent" style="display:none"></div>

</div>

<script src="../nav.js"></script>
<script>
const OWNER_ID = 'jack';

async function loadProfile() {
  try {
    const res = await fetch('../profiles-data.json?v=' + Date.now());
    const data = await res.json();
    const p = data.owners[OWNER_ID];
    if (!p) throw new Error('Owner not found');
    renderProfile(p);
  } catch (e) {
    document.getElementById('loadingState').textContent = 'Failed to load profile.';
    console.error(e);
  }
}

function renderProfile(p) {
  const photoHTML = p.photo
    ? `<img src="${p.photo}" alt="${p.name}">`
    : `<div class="avatar-placeholder">Photo Coming Soon</div>`;

  const lastGame = p.currentSeason.lastGame;
  const nextGame = p.currentSeason.nextGame;
  const resultClass = lastGame.result === 'W' ? 'win' : 'loss';

  const traitsHTML = p.traits.map(t => `
    <div class="trait-item">
      <span class="trait-icon">${t.emoji}</span>
      <span class="trait-label">${t.label}</span>
    </div>`).join('');

  const championCount = p.trophies.filter(t => t.name === 'League Champion').reduce((sum, t) => sum + t.count, 0);
  const championHTML = championCount > 1
    ? `<div class="owner-champion">${championCount}x League Champion</div>`
    : championCount === 1
    ? `<div class="owner-champion">League Champion</div>`
    : '';

  const ownsCard = p.rivalries.owns
    ? `<div class="fact-card"><div class="fact-card-label">Owns</div><div class="fact-card-value">${p.rivalries.owns.name} (${p.rivalries.owns.record})</div></div>`
    : '';

  const ownedByCard = `<div class="fact-card"><div class="fact-card-label">Owned By</div><div class="fact-card-value">${p.rivalries.ownedBy || 'No one'}</div></div>`;

  const nextGameHTML = nextGame ? `
      <div class="live-last-game" style="margin-top:10px; padding-top:10px; border-top:1px solid #222;">
        <span class="last-game-label">Next Game</span>
        <div class="last-game-result">
          <div class="last-game-detail">vs. ${nextGame.opponent}</div>
        </div>
        <div class="last-game-record">Lifetime ${nextGame.lifetimeVsOpponent}</div>
      </div>` : '';

  function renderStatBucket(stats) {
    return stats.map(s => `
      <div class="stats-row">
        <div class="stats-left">
          <span class="stats-name">${s.stat}</span>
          ${s.explainer ? `<span class="stats-explainer">${s.explainer}</span>` : ''}
        </div>
        <div class="stats-right">
          <span class="stats-val${s.isEarnings ? ' earnings' : ''}">${s.value}</span>
          ${s.rank ? `<span class="stats-rank">(${s.rank})</span>` : ''}
        </div>
      </div>`).join('');
  }

  const statsHTML = `
    <div class="stats-bucket">
      <div class="stats-bucket-label">General</div>
      ${renderStatBucket(p.careerStats.general)}
    </div>
    <div class="stats-bucket">
      <div class="stats-bucket-label">Regular Season</div>
      ${renderStatBucket(p.careerStats.regularSeason)}
    </div>
    <div class="stats-bucket">
      <div class="stats-bucket-label">Playoffs</div>
      ${renderStatBucket(p.careerStats.playoffs)}
    </div>
  `;

  function seasonBadge(result) {
    const map = {
      champion: ['badge-champion', 'Champion'],
      finalist: ['badge-finalist', 'Finalist'],
      playoff:  ['badge-playoff', 'Playoffs'],
      missed:   ['badge-missed', 'Missed'],
      bronze:   ['badge-bronze', 'Bronze Franz']
    };
    const [cls, label] = map[result] || ['badge-missed', 'Missed'];
    return `<span class="trigger-badge ${cls}">${label}</span>`;
  }

  const seasonsHTML = p.seasons.map(s => `
    <div class="accordion-item">
      <button class="accordion-trigger" onclick="this.closest('.accordion-item').classList.toggle('open')">
        <div class="trigger-left">
          <div class="trigger-year">${s.year}</div>
          ${seasonBadge(s.result)}
        </div>
        <div class="trigger-snapshot">
          <div class="snapshot-record">${s.record}</div>
          <div class="snapshot-finish">${s.finish !== 'TBD' ? s.finish + ' Place' : '—'}</div>
        </div>
        <div class="trigger-chevron">▼</div>
      </button>
      <div class="accordion-content">
        <div class="acc-bucket">
          <div class="acc-bucket-label">Team Name</div>
          <div class="acc-team-name">${s.teamName && s.teamName !== 'TBD' ? s.teamName : '—'}</div>
        </div>
        <div class="acc-bucket">
          <div class="acc-bucket-label">Regular Season</div>
          <div class="acc-row"><span class="acc-label">Finish</span><span class="acc-val">${s.finish}</span></div>
          <div class="acc-row"><span class="acc-label">Record</span><span class="acc-val">${s.record}</span></div>
          <div class="acc-row"><span class="acc-label">Points Per Game</span><span class="acc-val">${s.ptsPerGame}</span></div>
          <div class="acc-row"><span class="acc-label">Point Share</span><span class="acc-val">${s.pointShare}</span></div>
          <div class="acc-row"><span class="acc-label">Power Score</span><span class="acc-val">${s.powerScore}</span></div>
        </div>
        <div class="acc-bucket">
          <div class="acc-bucket-label">Season Summary</div>
          <div class="acc-row"><span class="acc-label">Net Earnings</span><span class="acc-val ${s.netEarnings && s.netEarnings.startsWith('-') ? 'loss' : 'earnings'}">${s.netEarnings}</span></div>
          <div class="acc-row"><span class="acc-label">Prestige Earned</span><span class="acc-val">${s.prestigeEarned}</span></div>
          <div class="acc-row"><span class="acc-label">Playoff Result</span><span class="acc-val ${s.result === 'champion' ? '' : s.result === 'missed' ? 'loss' : s.result === 'bronze' ? 'bronze' : ''}">${s.playoffResult}</span></div>
        </div>
      </div>
    </div>`).join('');

  const TROPHY_IMAGES = {
    'League Champion':                 'Daddy Graphic.png',
    '2nd Place':                       '2nd.png',
    '3rd Place':                       '3rd.png',
    'Regular Season Champion':         'regular season.png',
    'Owner of the Year':               'OOTY.png',
    'AVL Memorial Cup':                'avl memorial.png',
    'Rivalry Week':                    'rivalry week.png',
    'Hottest Team in Sports Bowl':     'Hottest Team in Sports Bowl.png',
    'Hung the * Chain':                'asterisk.png',
    'Intercontinental Champ':          'intercontinental.png',
    'Somehow the Champion':            'somehow.png',
    'Survivor King':                   'survivor.png',
    'Degen Bowl':                      'Gambler.png',
    "Dad Bod's Preseason Rankings":    'Preseason.png',
    "JopO or KG Pick 'Em":            'pick em.png',
    'Da Choppaaa Champ':               'da choppaaa.png',
    'Bronze Franz':                    'bronze franz.png'
  };

  const ALL_TROPHIES = [
    'League Champion', '2nd Place', '3rd Place', 'Regular Season Champion',
    'Owner of the Year', 'AVL Memorial Cup', 'Rivalry Week',
    'Hottest Team in Sports Bowl', 'Hung the * Chain', 'Intercontinental Champ',
    'Somehow the Champion', 'Survivor King', 'Degen Bowl',
    "Dad Bod's Preseason Rankings", "JopO or KG Pick 'Em",
    'Da Choppaaa Champ', 'Bronze Franz'
  ];

  const wonMap = {};
  p.trophies.forEach(t => { wonMap[t.name] = t.count; });

  const trophiesHTML = ALL_TROPHIES.map(name => {
    const count = wonMap[name] || 0;
    const imgFile = TROPHY_IMAGES[name];
    const won = count > 0;
    if (won) {
      const images = Array(count).fill(0).map(() =>
        `<img class="trophy-img" src="../images/${imgFile}" alt="${name}">`
      ).join('');
      return `
      <div class="trophy-card won">
        <div class="trophy-images">${images}</div>
        <div class="trophy-name">${name}</div>
        <div class="trophy-count">${count}x</div>
      </div>`;
    } else {
      return `
      <div class="trophy-card locked">
        <div class="trophy-images">
          <img class="trophy-img" src="../images/${imgFile}" alt="${name}">
        </div>
        <div class="trophy-name">${name}</div>
      </div>`;
    }
  }).join('');

  const html = `
    <!-- HERO -->
    <section class="hero">
      <div class="owner-name">${p.name}</div>
      <div class="owner-name-nickname">"${p.nickname}"</div>
      <div class="owner-subtitle">Member Since ${p.memberSince}</div>
      ${championHTML}
      <div class="avatar-wrap">${photoHTML}</div>
    </section>

    <!-- LIVE SEASON BANNER -->
    <div class="live-banner fade-in">
      <div class="live-dot">${p.currentSeason.year} Season</div>
      <div class="live-stats">
        <div class="live-stat">
          <div class="live-stat-val">${p.currentSeason.record}</div>
          <div class="live-stat-label">Record</div>
        </div>
        <div class="live-stat">
          <div class="live-stat-val">${p.currentSeason.standing}</div>
          <div class="live-stat-label">Standing</div>
        </div>
        <div class="live-stat">
          <div class="live-stat-val">${p.currentSeason.ptsPerGame}</div>
          <div class="live-stat-label">Pts/Gm</div>
        </div>
      </div>
      <div class="live-last-game">
        <span class="last-game-label">Last Game</span>
        <div class="last-game-result">
          <div class="result-pill ${resultClass}">${lastGame.result}</div>
          <div class="last-game-detail">vs. ${lastGame.opponent} · ${lastGame.score}</div>
        </div>
        <div class="last-game-record">Lifetime ${lastGame.lifetimeVsOpponent}</div>
      </div>
      ${nextGameHTML}
    </div>

    <!-- LAST UPDATED -->
    <div style="text-align:right; padding: 6px 20px 0; position:relative; z-index:1;">
      <span style="font-family:'Barlow Condensed',sans-serif; font-size:0.78rem; color:#444; letter-spacing:1px; text-transform:uppercase;">Updated ${p.lastUpdated || '—'}</span>
    </div>

    <!-- PRESTIGE BLOCK -->
    <div class="prestige-block fade-in">
      <div class="prestige-left">
        <div class="prestige-title">Prestige Ranking</div>
        <div class="prestige-rank">#${p.prestige.rank} of ${p.prestige.outOf}</div>
      </div>
      <div class="prestige-divider"></div>
      <div class="prestige-left">
        <div class="prestige-title">Prestige Points</div>
        <div class="prestige-rank">${p.prestige.points != null ? p.prestige.points.toLocaleString() : '—'}</div>
      </div>
    </div>

    <!-- TRAITS -->
    <div class="traits-grid fade-in">${traitsHTML}</div>

    <!-- QUICK FACTS -->
    <div class="quick-facts fade-in">
      <div class="quick-facts-title">Stats & Info</div>
      <div class="facts-grid">
        <div class="fact-card"><div class="fact-card-label">Location</div><div class="fact-card-value">${p.locationEmoji} ${p.location}</div></div>
        <div class="fact-card"><div class="fact-card-label">Member Since</div><div class="fact-card-value">${p.memberSince}</div></div>
        ${ownsCard}
        ${ownedByCard}
        <div class="fact-card"><div class="fact-card-label">${p.currentSeason.year} Rivals</div><div class="fact-card-value">${p.rivalries.rivals}</div></div>
        <div class="fact-card"><div class="fact-card-label">${p.currentSeason.year} Ryder Cup</div><div class="fact-card-value">${p.rivalries.ryderCup}</div></div>
      </div>
    </div>

    <!-- NARRATIVE -->
    <section class="narrative-section fade-in">
      <div class="section-label">${p.narrative.sectionLabel}</div>
      <div class="pull-quote">"${p.narrative.pullQuote}"</div>
      <p class="narrative-text">${p.narrative.body}</p>
    </section>

    <!-- CAREER STATS -->
    <section class="stats-section fade-in">
      <div class="section-title">Career Stats</div>
      ${statsHTML}
      <div class="table-footnote">* Indicates tied. Rankings out of 14 active owners.</div>
    </section>

    <!-- ANALYTICS -->
    <section class="trends-section fade-in">
      <div class="section-title">Analytics</div>

      <div class="chart-block">
        <div class="chart-label">Wins &amp; Finish</div>
        <canvas id="combinedChart" height="200"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Wins (L)</div>
          <div class="legend-item"><div class="legend-dot" style="background:#60a5fa;"></div> Finish (R)</div>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-label">Point Share</div>
        <canvas id="pointShareChart" height="200"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Point Share</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0392b; height:0; border-top:2px dashed #c0392b;"></div> Trend</div>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-label">Season Winnings</div>
        <canvas id="winningsChart" height="200"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Winnings</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c0392b; height:0; border-top:2px dashed #c0392b;"></div> Trend</div>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-label">Prestige Points Per Season</div>
        <canvas id="prestigeChart" height="200"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#c9a84c;"></div> Points Earned</div>
          <div class="legend-item"><div class="legend-dot" style="background:#555; height:0; border-top:2px dashed #555;"></div> Career Avg</div>
        </div>
      </div>
    </section>

    <!-- SEASON BY SEASON -->
    <section class="accordion-section fade-in">
      <div class="section-title">Season by Season</div>
      ${seasonsHTML}
    </section>

    <!-- TROPHY CASE -->
    <section class="trophy-section fade-in">
      <div class="trophy-header">Trophy Case</div>
      <div class="trophy-list">${trophiesHTML}</div>
    </section>

  `;

  document.getElementById('loadingState').style.display = 'none';
  const content = document.getElementById('profileContent');
  content.innerHTML = html;
  content.style.display = 'block';

  // Scroll fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  // Init charts after DOM is ready
  initCharts(p);
}

loadProfile();

// ── CHARTS ──
function initCharts(p) {
  const c = p.charts;
  const labels = c.winsAndFinish.years.map(y => "'" + String(y).slice(2));

  const tooltipDefaults = {
    backgroundColor: '#1a1a1a',
    borderColor: '#444',
    borderWidth: 1,
    titleColor: '#f5f5f5',
    bodyColor: '#c9a84c',
    titleFont: { family: 'Barlow Condensed', size: 14, weight: 'bold' },
    bodyFont: { family: 'Barlow Condensed', size: 16, weight: 'bold' },
    padding: 10,
    displayColors: false
  };

  const scaleX = {
    grid: { color: 'rgba(255,255,255,0.04)' },
    ticks: { color: '#666', font: { family: 'Barlow Condensed', size: 11 } },
    border: { color: '#222' }
  };

  const scaleY = {
    grid: { color: 'rgba(255,255,255,0.06)', borderDash: [4,4] },
    ticks: { color: '#666', font: { family: 'Barlow Condensed', size: 11 } },
    border: { color: '#222' }
  };

  const animOpts = { duration: 1000, easing: 'easeInOutQuart' };
  const interactionOpts = { mode: 'nearest', intersect: false, axis: 'x' };

  function trendLine(data) {
    const clean = data.filter(v => v !== null);
    if (clean.length < 2) return data.map(() => null);
    const n = data.length;
    const xMean = (n - 1) / 2;
    const yMean = data.reduce((a, b) => a + (b || 0), 0) / n;
    let num = 0, den = 0;
    data.forEach((y, x) => { if (y !== null) { num += (x - xMean) * (y - yMean); den += (x - xMean) ** 2; } });
    const slope = den ? num / den : 0;
    const intercept = yMean - slope * xMean;
    return data.map((_, x) => parseFloat((slope * x + intercept).toFixed(2)));
  }

  const chartBuilders = {};
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && chartBuilders[entry.target.id]) {
        chartBuilders[entry.target.id]();
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });

  function registerChart(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    chartBuilders[id] = fn;
    observer.observe(el);
  }

  // Combined wins + finish
  registerChart('combinedChart', () => new Chart(document.getElementById('combinedChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Wins', data: c.winsAndFinish.wins, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.06)', fill: true, pointBackgroundColor: '#22c55e', borderWidth: 2, yAxisID: 'yWins', order: 2, tension: 0.3 },
        { label: 'Finish', data: c.winsAndFinish.finish, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.04)', fill: false, pointBackgroundColor: '#60a5fa', borderWidth: 2, yAxisID: 'yFinish', order: 1, tension: 0.3 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 16 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, callbacks: { title: i => i[0].label, label: i => i.dataset.label + ': ' + i.formattedValue } } },
      scales: {
        x: scaleX,
        yWins: { ...scaleY, type: 'linear', position: 'left', min: 0, max: 14, ticks: { ...scaleY.ticks, stepSize: 2, color: '#22c55e' }, title: { display: true, text: 'Wins', color: '#22c55e', font: { family: 'Barlow Condensed', size: 11 } } },
        yFinish: { ...scaleY, type: 'linear', position: 'right', min: 1, max: 14, reverse: true, grid: { drawOnChartArea: false }, ticks: { ...scaleY.ticks, stepSize: 2, color: '#60a5fa' }, title: { display: true, text: 'Finish', color: '#60a5fa', font: { family: 'Barlow Condensed', size: 11 } } }
      },
      elements: { point: { radius: 4, hoverRadius: 6 }, line: { tension: 0.3 } }
    }
  }));

  // Point share
  const psData = c.pointShare.values;
  registerChart('pointShareChart', () => new Chart(document.getElementById('pointShareChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Point Share', data: psData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', fill: true, pointBackgroundColor: '#22c55e', borderWidth: 2, order: 2, tension: 0.3 },
        { label: 'Trend', data: trendLine(psData), borderColor: '#c0392b', borderDash: [6,4], borderWidth: 2, pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, filter: i => i.datasetIndex === 0, callbacks: { title: i => i[0].label, label: i => i.parsed.y + '%' } } },
      scales: { x: scaleX, y: { ...scaleY, min: 0, ticks: { ...scaleY.ticks, callback: v => v + '%' } } },
      elements: { point: { radius: 4, hoverRadius: 6, backgroundColor: '#22c55e', borderColor: '#22c55e' }, line: { tension: 0.3 } }
    }
  }));

  // Winnings
  const wData = c.winnings.values;
  registerChart('winningsChart', () => new Chart(document.getElementById('winningsChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Winnings', data: wData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', fill: true, pointBackgroundColor: '#22c55e', borderWidth: 2, order: 2, tension: 0.3 },
        { label: 'Trend', data: trendLine(wData), borderColor: '#c0392b', borderDash: [6,4], borderWidth: 2, pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, filter: i => i.datasetIndex === 0, callbacks: { title: i => i[0].label, label: i => '$' + i.parsed.y } } },
      scales: { x: scaleX, y: { ...scaleY, min: 0, ticks: { ...scaleY.ticks, stepSize: 50, callback: v => '$' + v } } },
      elements: { point: { radius: 4, hoverRadius: 6, backgroundColor: '#22c55e', borderColor: '#22c55e' }, line: { tension: 0.3 } }
    }
  }));

  // Prestige per season bar
  const prData = c.prestigePerSeason.values;
  const prAvg = prData.filter(v => v !== null).reduce((a,b) => a+b, 0) / prData.filter(v => v !== null).length || 0;
  registerChart('prestigeChart', () => new Chart(document.getElementById('prestigeChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Points', data: prData, backgroundColor: prData.map(v => v !== null && v >= prAvg ? 'rgba(201,168,76,0.85)' : 'rgba(201,168,76,0.35)'), borderColor: prData.map(v => v !== null && v >= prAvg ? '#c9a84c' : 'rgba(201,168,76,0.5)'), borderWidth: 1, borderRadius: 3, order: 2 },
        { label: 'Career Avg', data: prData.map(() => prAvg ? parseFloat(prAvg.toFixed(1)) : null), type: 'line', borderColor: '#555', borderDash: [6,4], borderWidth: 2, pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, filter: i => i.datasetIndex === 0, callbacks: { title: i => i[0].label, label: i => i.parsed.y + ' pts' } } },
      scales: { x: scaleX, y: { ...scaleY, min: 0, ticks: { ...scaleY.ticks, stepSize: 50 } } }
    }
  }));
}
</script>
</body>
</html>
