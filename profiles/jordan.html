<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan — Slingshot Engaged</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --black: #0a0a0a;
    --bg: #0a0a0a;
    --dark: #111111;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --card: #1a1a1a;
    --card2: #222222;
    --gray: #2a2a2a;
    --border: #2a2a2a;
    --gray-light: #333333;
    --white: #f0f0f0;
    --text: #f0f0f0;
    --text-body: #e8e8e8;
    --label: #d8d8d8;
    --muted: #bbb;
    --gold: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 38px,
      rgba(255,255,255,0.018) 38px, rgba(255,255,255,0.018) 40px
    );
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    max-width: 780px;
    margin: 0 auto;
    background: var(--black);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, #1a0a08 0%, var(--black) 100%);
    padding: 36px 20px 0;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(217,59,43,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .owner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 4px;
    color: var(--white);
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .owner-name-nickname {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 3px;
    color: var(--red);
    line-height: 1;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .owner-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .owner-champion {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .owner-champion.is-champion {
    color: var(--gold);
  }
  .owner-champion.last-status { margin-bottom: 24px; }
  .owner-champion.mid-status { margin-bottom: 6px; }

  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto;
  }

  .avatar-wrap img {
    width: 240px;
    height: 240px;
    display: block;
    margin: 0 auto;
    object-fit: cover;
    object-position: top;
    border-radius: 50%;
    border: 3px solid var(--red);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.8));
    position: relative;
    z-index: 1;
  }

  .avatar-placeholder {
    width: 240px;
    height: 240px;
    background: var(--card);
    border: 2px dashed #333;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0 auto;
  }

  /* ── LIVE SEASON BANNER ── */
  .live-banner {
    position: relative;
    z-index: 1;
    margin: 28px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }

  .live-dot {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    flex-shrink: 0;
  }

  .live-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .live-stat { text-align: center; }

  .live-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.75rem;
    color: var(--white);
    line-height: 1;
  }

  .live-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.08rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--label);
    margin-top: 3px;
  }

  .live-last-game {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .last-game-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }

  .last-game-result {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .result-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .result-pill.win { background: #1a3a1a; color: #6aaa6a; border: 1px solid #6aaa6a; }
  .result-pill.loss { background: #3a1a1a; color: #aa6a6a; border: 1px solid #aa6a6a; }

  .last-game-detail {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.45rem;
    color: var(--white);
  }

  .last-game-record {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.27rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── PRESTIGE BLOCK ── */
  .prestige-block {
    position: relative;
    z-index: 1;
    margin: 14px 20px 0;
    background: linear-gradient(135deg, #1a1500 0%, #111000 100%);
    border: 1px solid #3a3010;
    border-radius: 8px;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .prestige-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    text-align: center;
    flex: 1;
  }

  .prestige-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
  }

  .prestige-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--gold);
    line-height: 1;
  }

  .prestige-divider {
    width: 1px;
    background: #3a3010;
    align-self: stretch;
    margin: 0 16px;
  }

  /* ── TRAITS ── */
  .traits-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 20px 0;
  }

  .trait-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .trait-icon { font-size: 2.2rem; line-height: 1; flex-shrink: 0; }

  .trait-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.2;
  }

  /* ── QUICK FACTS ── */
  .quick-facts {
    position: relative;
    z-index: 1;
    padding: 18px 20px;
    margin-top: 18px;
  }

  .quick-facts-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 14px;
  }

  .facts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .fact-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .fact-card-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--label);
  }

  .fact-card-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  /* keep old classes so nothing breaks if referenced */
  .fact-row { display: none; }
  .location-row { display: none; }
  .h2h-bar-wrap { display: none; }
  .h2h-bar { display: none; }
  .h2h-bar-fill { display: none; }
  .h2h-label { display: none; }

  /* ── DOSSIER ── */
  .dossier-section {
    position: relative;
    z-index: 1;
    padding: 32px 20px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 16px;
  }


  .tone-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tone-btn {
    flex: 1;
    background: var(--surface2);
    color: var(--label);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 4px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tone-btn.active {
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    border-color: var(--gold);
  }
  .tone-btn:hover:not(.active) {
    border-color: var(--muted);
    color: var(--white);
  }

  .dossier-trigger-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 8px;
    padding: 20px 20px 20px 22px;
  }

  .dossier-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 8px;
  }

  .dossier-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .dossier-subline {
    font-family: 'Barlow', sans-serif;
    font-size: 1.05rem;
    color: var(--label);
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .pull-file-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 48px;
  }
  .pull-file-btn:hover { background: var(--red-bright); }
  .pull-file-btn:disabled {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: default;
  }

  .dossier-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold);
    border-radius: 8px;
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }
  .dossier-panel.visible { display: block; }

  .dossier-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .dossier-label-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .dossier-stamp {
    display: none;
  }

  .dossier-loading {
    padding: 36px 18px;
    text-align: center;
  }

  .dossier-loading-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .loading-dots span {
    display: inline-block;
    animation: dotblink 1.2s infinite;
    font-size: 1.4rem;
    color: var(--muted);
    line-height: 1;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotblink {
    0%, 80%, 100% { opacity: 0.1; }
    40% { opacity: 1; }
  }

  .dossier-pull-quote {
    border-left: 3px solid var(--gold);
    margin: 20px 18px 0;
    padding: 2px 0 2px 16px;
  }

  .dossier-pull-quote p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.35rem;
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.35;
  }

  .dossier-body {
    padding: 16px 18px 20px;
    font-family: 'Barlow', sans-serif;
    font-size: 1.15rem;
    color: var(--text-body);
    line-height: 1.8;
  }

  .dossier-body p { margin-bottom: 14px; }
  .dossier-body p:last-child { margin-bottom: 0; }

  .dossier-error {
    padding: 24px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--red-bright);
    text-align: center;
    text-transform: uppercase;
  }

  .dossier-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .gen-again-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--label);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    min-height: 44px;
  }
  .gen-again-btn:hover { border-color: var(--gold); color: var(--white); }

  .dossier-disclaimer {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CAREER STATS ── */
  .stats-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 16px;
  }

  .stats-bucket { margin-bottom: 20px; }

  .stats-bucket-label {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a2a2a;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
  }

  .stats-row:nth-child(odd) { background: var(--surface2); }
  .stats-row:nth-child(even) { background: var(--card); }
  .stats-row:first-child { border-radius: 4px 4px 0 0; }
  .stats-row:last-child { border-radius: 0 0 4px 4px; }

  .stats-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .stats-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.27rem;
    color: var(--label);
    line-height: 1.2;
  }

  .stats-explainer {
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--muted);
    line-height: 1.3;
  }

  .stats-right {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .stats-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.39rem;
    font-weight: 700;
    color: var(--white);
  }

  .stats-val.earnings { color: #6aaa6a; }
  .stats-val.luck-pos { color: #6aaa6a; }
  .stats-val.luck-neg { color: #aa5555; }

  .stats-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.08rem;
    font-weight: 700;
    color: var(--gold);
  }

  .table-footnote {
    font-family: 'Barlow', sans-serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
  }

  /* ── CAREER TRENDS ── */
  .trends-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .chart-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 14px 14px;
    margin-bottom: 16px;
  }

  .chart-label {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    color: var(--label);
  }

  .legend-dot {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── SEASON ACCORDION ── */
  .accordion-section {
    position: relative;
    z-index: 1;
    padding: 0 20px 32px;
  }

  .accordion-item {
    margin-bottom: 6px;
    border-radius: 6px;
    overflow: hidden;
  }

  .accordion-trigger {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
  }

  .accordion-item.open .accordion-trigger {
    border-radius: 6px 6px 0 0;
    border-bottom-color: var(--dark);
  }

  .trigger-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .trigger-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--white);
    letter-spacing: 2px;
    line-height: 1;
    flex-shrink: 0;
  }

  .trigger-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .badge-champion { background: var(--gold); color: #000; }
  .badge-finalist { background: #888; color: #000; }
  .badge-playoff { background: #1a3a1a; color: #6aaa6a; border: 1px solid #6aaa6a; }
  .badge-missed { background: #2a1a1a; color: #aa5555; border: 1px solid #aa5555; }
  .badge-bronze { background: #2a1a0a; color: #cd7f32; border: 1px solid #cd7f32; }

  .trigger-snapshot {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
  }

  .snapshot-record {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.52rem;
    color: var(--white);
    line-height: 1;
  }

  .snapshot-finish {
    font-family: 'Barlow Condensed', sans-serif;

  content.style.display = 'block';

  // Scroll fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  // Init charts after DOM is ready
  initCharts(p);
}

// ── SINGLE FETCH FOR BOTH PROFILE AND COMPARE ──
let allOwners = {};
let cmpCharts = [];
let allOwnersReady = false;
let allOwnersPromise = null;

async function loadAll() {
  try {
    const res = await fetch('../profiles-data.json?v=' + Date.now());
    const data = await res.json();
    allOwners = data.owners;
    allOwnersReady = true;

    // Render profile
    const p = allOwners[OWNER_ID];
    if (!p) throw new Error('Owner not found');
    renderProfile(p);

    // Populate compare dropdown now that data is ready
    const sel = document.getElementById('compareSelect');
    if (sel) {
      sel.innerHTML = '<option value="">— Pick an Owner —</option>' +
        Object.keys(allOwners).filter(k => k !== OWNER_ID)
          .sort((a, b) => allOwners[a].name.localeCompare(allOwners[b].name))
          .map(k => `<option value="${k}">${allOwners[k].name}</option>`).join('');
    }
  } catch(e) {
    document.getElementById('loadingState').textContent = 'Failed to load profile.';
    console.error(e);
  }
}
allOwnersPromise = loadAll();

let cmpOwnerA = OWNER_ID;
let cmpOwnerB = null;

function populateCmpDropdowns(selAId, selBId, ownerAId, ownerBId) {
  const owners = Object.keys(allOwners).sort((a, b) => allOwners[a].name.localeCompare(allOwners[b].name));
  [selAId, selBId].forEach((selId, idx) => {
    const sel = document.getElementById(selId);
    if (!sel) return;
    const currentId = idx === 0 ? ownerAId : ownerBId;
    sel.innerHTML = owners.map(k => `<option value="${k}" ${k === currentId ? 'selected' : ''}>${allOwners[k].name}</option>`).join('');
  });
}

function swapOwner(side, newId) {
  if (side === 'a') cmpOwnerA = newId;
  else cmpOwnerB = newId;
  renderCompare(cmpOwnerA, cmpOwnerB);
}

async function openCompare() {
  const sel = document.getElementById('compareSelect');
  if (!sel || !sel.value) return;
  if (!allOwnersReady) await allOwnersPromise;
  cmpOwnerA = OWNER_ID;
  cmpOwnerB = sel.value;
  renderCompare(cmpOwnerA, cmpOwnerB);
  document.getElementById('compareOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderCompare(ownerAId, ownerBId) {
  const me = allOwners[ownerAId];
  const opp = allOwners[ownerBId];
  if (!me || !opp) return;

  // Destroy old charts
  cmpCharts.forEach(c => c.destroy());
  cmpCharts = [];

  // Update names
  const elNameA = document.getElementById('cmpNameA');
  elNameA.textContent = me.name.toUpperCase();
  elNameA.href = `${ownerAId}.html`;
  document.getElementById('cmpNickA').textContent = '"' + (me.nickname || '') + '"';
  const elNameB = document.getElementById('cmpNameB');
  elNameB.textContent = opp.name.toUpperCase();
  elNameB.href = `${ownerBId}.html`;
  document.getElementById('cmpNickB').textContent = '"' + (opp.nickname || '') + '"';

  // Update photos
  const photoA = document.getElementById('cmpPhotoA');
  const photoB = document.getElementById('cmpPhotoB');
  if (photoA) { photoA.src = me.photo || ''; photoA.style.display = me.photo ? 'block' : 'none'; }
  if (photoB) { photoB.src = opp.photo || ''; photoB.style.display = opp.photo ? 'block' : 'none'; }

  // Populate dropdowns
  populateCmpDropdowns('cmpSelectA', 'cmpSelectB', ownerAId, ownerBId);

  const LOWER_IS_BETTER = ['Avg Finish'];

  function cmpResult(aRaw, bRaw, lowerBetter) {
    const a = parseFloat(String(aRaw).replace(/[^\d.-]/g, ''));
    const b = parseFloat(String(bRaw).replace(/[^\d.-]/g, ''));
    if (isNaN(a) || isNaN(b)) return 'tied';
    if (a === b) return 'tied';
    const aWins = lowerBetter ? a < b : a > b;
    return aWins ? 'a' : 'b';
  }

  function fmtVal(v, label) {
    if (v == null) return '—';
    if (label === 'Net Earnings') {
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      const abs = Math.abs(n);
      const formatted = Number.isInteger(n) ? abs.toLocaleString() : abs.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      return (n < 0 ? '-$' : '$') + formatted;
    }
    if (label === 'Power Score' || label === 'Career High') {
      return parseFloat(v).toFixed(2);
    }
    if (label === 'Win %' || label === 'Playoff Win %') {
      return parseFloat(v).toFixed(3);
    }
    if (label === 'Avg Finish') {
      return parseFloat(v).toFixed(1);
    }
    if (typeof v === 'number' && v >= 1000) {
      return v.toLocaleString('en-US');
    }
    return v;
  }

  function statRow(label, aVal, bVal, lowerBetter, sub) {
    const dA = fmtVal(aVal, label);
    const dB = fmtVal(bVal, label);
    const winner = cmpResult(aVal, bVal, lowerBetter);
    const arrowA = winner === 'a' ? '<span class="cmp-arrow cmp-arrow-a">◀◀</span>' : '';
    const arrowB = winner === 'b' ? '<span class="cmp-arrow cmp-arrow-b">▶▶</span>' : '';
    return `<div class="cmp-stat-row">
      <div class="cmp-val-a">${dA}</div>
      <div class="cmp-arrow-col-a">${arrowA}</div>
      <div class="cmp-stat-name">${label}${sub ? '<span class="cmp-stat-sub">' + sub + '</span>' : ''}</div>
      <div class="cmp-arrow-col-b">${arrowB}</div>
      <div class="cmp-val-b">${dB}</div>
    </div>`;
  }

  function getStat(owner, bucket, statName) {
    const s = (owner.careerStats[bucket] || []).find(x => x.stat === statName);
    return s ? s.value : null;
  }

  function buildStatSection(title, rows) {
    return `<div class="cmp-section">
      <div class="cmp-section-title">${title}</div>
      ${rows.join('')}
    </div>`;
  }

  // ── STAT SECTIONS ──

  // H2H name mapping: owner ID → name used in H2H dataset
  const H2H_NAME_MAP = {
    alex: 'Alex V.', andy: 'Andy', brian: 'Brian', daniel: 'Daniel',
    dylan: 'Dylan', jack: 'Jack', jordan: 'Jordan', kyle: 'Kyle',
    luke: 'Luke', matt: 'Matt', mike: 'Mike M.', scott: 'Scott',
    tim: 'Tim H.', wade: 'Wade'
  };

  function getH2HRecord(idA, idB) {
    if (typeof H2H_DATA === 'undefined') return { winsA: null, winsB: null, pctA: null, pctB: null };
    const nameA = H2H_NAME_MAP[idA];
    const nameB = H2H_NAME_MAP[idB];
    if (!nameA || !nameB) return { winsA: null, winsB: null, pctA: null, pctB: null };
    const key1 = nameA + '||' + nameB;
    const key2 = nameB + '||' + nameA;
    const entry = H2H_DATA[key1] || H2H_DATA[key2];
    if (!entry) return { winsA: null, winsB: null, pctA: null, pctB: null };
    let winsA, winsB;
    if (H2H_DATA[key1]) {
      winsA = entry.all.w0; winsB = entry.all.w1;
    } else {
      winsA = entry.all.w1; winsB = entry.all.w0;
    }
    const total = winsA + winsB;
    const pctA = total > 0 ? (winsA / total).toFixed(3) : null;
    const pctB = total > 0 ? (winsB / total).toFixed(3) : null;
    return { winsA, winsB, pctA, pctB };
  }

  const h2hRec = getH2HRecord(ownerAId, ownerBId);
  const h2hWinsA = h2hRec.winsA;
  const h2hWinsB = h2hRec.winsB;
  const h2hPctA = h2hRec.pctA;
  const h2hPctB = h2hRec.pctB;
  const h2hRow = (() => {
    function h2hArrowRow(label, vA, vB) {
      const dA = vA != null ? vA : '—';
      const dB = vB != null ? vB : '—';
      const a = parseFloat(vA), b = parseFloat(vB);
      const arrowA = (!isNaN(a) && !isNaN(b) && a > b) ? '<span class="cmp-arrow cmp-arrow-a">◀◀</span>' : '';
      const arrowB = (!isNaN(a) && !isNaN(b) && b > a) ? '<span class="cmp-arrow cmp-arrow-b">▶▶</span>' : '';
      return `<div class="cmp-stat-row">
        <div class="cmp-val-a">${dA}</div>
        <div class="cmp-arrow-col-a">${arrowA}</div>
        <div class="cmp-stat-name">${label}</div>
        <div class="cmp-arrow-col-b">${arrowB}</div>
        <div class="cmp-val-b">${dB}</div>
      </div>`;
    }
    return h2hArrowRow('Wins', h2hWinsA, h2hWinsB) + h2hArrowRow('Win %', h2hPctA, h2hPctB);
  })();

  function getPrestige(owner) {
    const s = getStat(owner, 'general', 'Prestige Points');
    if (s != null) return s;
    return owner.prestige && owner.prestige.points != null ? owner.prestige.points : null;
  }

  const generalRows = [
    statRow('Seasons Played', getStat(me,'general','Seasons Played'), getStat(opp,'general','Seasons Played')),
    statRow('Net Earnings', getStat(me,'general','Net Earnings'), getStat(opp,'general','Net Earnings')),
    statRow('Prestige Points', getPrestige(me), getPrestige(opp)),
  ];

  const rsRows = [
    statRow('Wins', getStat(me,'regularSeason','Wins'), getStat(opp,'regularSeason','Wins')),
    statRow('Win %', getStat(me,'regularSeason','Win %'), getStat(opp,'regularSeason','Win %')),
    statRow('Avg Finish', getStat(me,'regularSeason','Avg Finish'), getStat(opp,'regularSeason','Avg Finish'), true, 'lower is better'),
    statRow('Pts / Game', getStat(me,'regularSeason','Pts Per Game'), getStat(opp,'regularSeason','Pts Per Game')),
    statRow('Point Share', getStat(me,'regularSeason','Point Share'), getStat(opp,'regularSeason','Point Share'), false, '% of total league points scored since joining the league'),
    statRow('Career High', getStat(me,'regularSeason','Career High Score'), getStat(opp,'regularSeason','Career High Score')),
    statRow('Weekly High Scores', getStat(me,'regularSeason','Weekly High Scores'), getStat(opp,'regularSeason','Weekly High Scores')),
    statRow('Power Score', getStat(me,'regularSeason','Power Score'), getStat(opp,'regularSeason','Power Score')),
    statRow('Weeks at #1 in Power Score', getStat(me,'regularSeason','Weeks at #1'), getStat(opp,'regularSeason','Weeks at #1')),
    statRow('Boom Rate', getStat(me,'regularSeason','Boom Rate'), getStat(opp,'regularSeason','Boom Rate'), false, '120%+ of league avg'),
    statRow('Start Rate', getStat(me,'regularSeason','Start Rate'), getStat(opp,'regularSeason','Start Rate'), false, 'at or above league avg'),
    statRow('Luck Rate', getStat(me,'regularSeason','Luck Rate'), getStat(opp,'regularSeason','Luck Rate'), false, 'win % above/below expected'),
  ];

  const poRows = [
    statRow('Appearances', getStat(me,'playoffs','Appearances'), getStat(opp,'playoffs','Appearances')),
    statRow('Wins', getStat(me,'playoffs','Wins'), getStat(opp,'playoffs','Wins')),
    statRow('Win %', getStat(me,'playoffs','Win %'), getStat(opp,'playoffs','Win %')),
    statRow('Championships', getStat(me,'playoffs','Championships'), getStat(opp,'playoffs','Championships')),
  ];

  // ── CHARTS ──
  const YEARS = [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
  const chartLabels = YEARS.map(y => "'" + String(y).slice(2));

  function getChartArr(owner, key, subkey) {
    try { return owner.charts[key][subkey]; } catch(e) { return YEARS.map(() => null); }
  }

  const cmpTooltipDefaults = {
    backgroundColor: '#1a1a1a', borderColor: '#2a2a2a', borderWidth: 1,
    titleColor: '#c9a84c', bodyColor: '#d0d0d0',
    titleFont: { family: 'Barlow Condensed', size: 13, weight: 'bold' },
    bodyFont: { family: 'Barlow Condensed', size: 14, weight: 'bold' },
    padding: 8, displayColors: true
  };
  const cmpScaleX = { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#d8d8d8',font:{family:'Barlow Condensed',size:11}}, border:{color:'#2a2a2a'} };
  const cmpScaleY = { grid:{color:'rgba(255,255,255,0.06)',borderDash:[4,4]}, ticks:{color:'#d8d8d8',font:{family:'Barlow Condensed',size:11}}, border:{color:'#2a2a2a'} };

  function buildLineChart(canvasId, datasets, yOpts, tooltipFmt) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: datasets.map(d => ({
          label: d.label, data: d.data,
          borderColor: d.color,
          backgroundColor: d.dash ? 'transparent' : d.color.replace(')', ',0.06)').replace('rgb','rgba'),
          fill: false,
          pointBackgroundColor: d.color,
          pointRadius: d.noPoint ? 0 : 3,
          borderWidth: d.dash ? 2 : 2,
          borderDash: d.dash ? [6,4] : [],
          tension: 0.3
        }))
      },
      options: {
        responsive: true, layout:{padding:{top:12}},
        interaction: { mode: 'index', intersect: false },
        plugins:{ legend:{display:false}, tooltip:{...cmpTooltipDefaults, callbacks:{
          title: i => i[0].label,
          label: i => {
            if (i.dataset.borderDash && i.dataset.borderDash.length) return null;
            const v = i.parsed.y;
            return i.dataset.label + ': ' + (tooltipFmt && v != null ? tooltipFmt(v) : v);
          }
        }}},
        scales:{ x: cmpScaleX, y: {...cmpScaleY, ...yOpts} }
      }
    });
    cmpCharts.push(chart);
  }

  function buildBarChart(canvasId, datasets, tooltipFmt) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: chartLabels,
        datasets: datasets.map(d => d.line ? {
          type: 'line', label: d.label, data: d.data,
          borderColor: d.color, borderDash: d.dash ? [6,4] : [],
          borderWidth: 2, pointRadius: 0, fill: false, order: 0
        } : {
          label: d.label, data: d.data,
          backgroundColor: d.color === '#f97316' ? 'rgba(249,115,22,0.7)' : 'rgba(96,165,250,0.5)',
          borderColor: d.color, borderWidth: 1, borderRadius: 2, order: 1
        })
      },
      options: {
        responsive: true, layout:{padding:{top:12}},
        interaction: { mode: 'index', intersect: false },
        plugins:{ legend:{display:false}, tooltip:{...cmpTooltipDefaults, callbacks:{
          title: i => i[0].label,
          label: i => {
            if (i.dataset.borderDash && i.dataset.borderDash.length) return null;
            const v = i.parsed.y;
            return i.dataset.label + ': ' + (tooltipFmt && v != null ? tooltipFmt(v) : v);
          }
        }}},
        scales:{ x: cmpScaleX, y: {...cmpScaleY, min:0} }
      }
    });
    cmpCharts.push(chart);
  }

  const ALL_TROPHIES = [

    'Hottest Team in Sports Bowl','Hung the * Chain','Intercontinental Champ',
    'Somehow the Champion','Survivor King','Degen Bowl',

  ];

  const TROPHY_IMAGES = {

    'Regular Season Champion':'regular season.png','Owner of the Year':'OOTY.png',
    'AVL Memorial Cup':'avl memorial.png','Rivalry Week':'rivalry week.png',
    'Hottest Team in Sports Bowl':'Hottest Team in Sports Bowl.png',
    'Hung the * Chain':'asterisk.png','Intercontinental Champ':'intercontinental.png',
    'Somehow the Champion':'somehow.png','Survivor King':'survivor.png',
    'Degen Bowl':'Gambler.png',"Dad Bod\'s Preseason Rankings":'Preseason.png',
    "JopO or KG Pick \'Em":'pick em.png','Da Choppaaa Champ':'da choppaaa.png',
    'Bronze Franz':'bronze franz.png'
  };

  function wonMap(owner) {

    (owner.trophies || []).forEach(t => { m[t.name] = t.count || 0; });
    return m;
  }

  const wmA = wonMap(me);
  const wmB = wonMap(opp);

  const trophyRows = ALL_TROPHIES.map(name => {
    const cA = wmA[name] || 0;
    const cB = wmB[name] || 0;
    const img = TROPHY_IMAGES[name] || '';
    const aHighlight = cA > cB ? 'color:#f97316' : cA === cB && cA > 0 ? 'color:var(--gold)' : 'color:#333';

    const aImgs = cA > 0
      ? Array(cA).fill(0).map(() => `<img class="cmp-trophy-img" src="../images/${img}" alt="${name}">`).join('')
      : `<img class="cmp-trophy-img cmp-locked" src="../images/${img}" alt="${name}">`;
    const bImgs = cB > 0
      ? Array(cB).fill(0).map(() => `<img class="cmp-trophy-img" src="../images/${img}" alt="${name}">`).join('')
      : `<img class="cmp-trophy-img cmp-locked" src="../images/${img}" alt="${name}">`;
    return `<div class="cmp-trophy-row">
      <div class="cmp-trophy-imgs-a">${aImgs}</div>
      <div class="cmp-trophy-name">${name}</div>
      <div class="cmp-trophy-imgs-b">${bImgs}</div>

  // ── ASSEMBLE BODY ──
  document.getElementById('cmpBody').innerHTML = `
    <div class="cmp-section">
      <div class="cmp-section-title">Head to Head</div>
      ${h2hRow}

    ${buildStatSection('General', generalRows)}

    <div class="cmp-section">

        </div>
      </div>
    </div>

    <div class="cmp-section">
      <div class="cmp-section-title">Point Share by Season</div>

        </div>

    <div class="cmp-section">

    <div class="cmp-section">

  // Build charts after DOM inserted
  setTimeout(() => {
    const PS_LEAGUE_AVG = 7.14;

    // Wins
    const winsA = getChartArr(me, 'winsAndFinish', 'wins');
    const winsB = getChartArr(opp, 'winsAndFinish', 'wins');
    const winsYears = chartLabels.length;
    const halfLine = Array(winsYears).fill(7);
    buildLineChart('cmpWinsChart', [
      { label: me.name, data: winsA, color: '#f97316' },
      { label: opp.name, data: winsB, color: '#60a5fa' },
      { label: '.500', data: halfLine, color: '#e0e0e0', dash: true, noPoint: true }
    ], {min:0, max:14, ticks:{...cmpScaleY.ticks, stepSize:2}}, v => v + ' wins');

    // Point Share with league avg line
    const psA = getChartArr(me, 'pointShare', 'values').map(v => v == null ? null : parseFloat((v < 1 ? v * 100 : v).toFixed(2)));
    const psB = getChartArr(opp, 'pointShare', 'values').map(v => v == null ? null : parseFloat((v < 1 ? v * 100 : v).toFixed(2)));
    const allPsYears = chartLabels.map((_, i) => psA[i] != null || psB[i] != null ? PS_LEAGUE_AVG : null);
    buildLineChart('cmpPsChart', [
      { label: me.name, data: psA, color: '#f97316' },
      { label: opp.name, data: psB, color: '#60a5fa' },
      { label: 'League Avg', data: allPsYears, color: '#e0e0e0', dash: true, noPoint: true }
    ], {min:5, max:10, ticks:{...cmpScaleY.ticks, callback:v=>v+'%'}}, v => v != null ? v.toFixed(2)+'%' : '');

    // Winnings
    const earA = getChartArr(me, 'winnings', 'values');
    const earB = getChartArr(opp, 'winnings', 'values');
    buildBarChart('cmpWinningsChart', [
      { label: me.name, data: earA, color: '#f97316' },
      { label: opp.name, data: earB, color: '#60a5fa' }
    ], v => '$' + v);

    // Prestige cumulative
    const prA = getChartArr(me, 'prestigePerSeason', 'values');
    const prB = getChartArr(opp, 'prestigePerSeason', 'values');
    function cumulative(arr) {
      let total = 0;
      return arr.map(v => {
        if (v != null && v > 0) total += v;
        return total > 0 ? total : null;
      });
    }
    const prCumA = cumulative(prA);
    const prCumB = cumulative(prB);
    function holdFlat(arr) {
      let last = null;
      return arr.map(v => {
        if (v != null) { last = v; return v; }
        return last;
      });
    }
    const prFlatA = holdFlat(prCumA);
    const prFlatB = holdFlat(prCumB);
    buildLineChart('cmpPrestigeChart', [
      { label: me.name,  data: prFlatA, color: '#f97316' },
      { label: opp.name, data: prFlatB, color: '#60a5fa' }
    ], { min: 0, ticks: { ...cmpScaleY.ticks } }, v => v.toLocaleString() + ' pts');
  }, 50);

}

- A regular season finish of 1st = best record that season only. NOT a championship.
- Championship years for this owner: ${champYears.length ? champYears.join(', ') : 'none'}. Do not claim championships in any other years.
- Seasons played: ${completedSeasons.length}. Do not reference more or fewer.
- NEVER use last names. This rule has no exceptions, not even for nicknames derived from last names.
- NEVER invert owns/owned by direction. If this owner OWNS someone, this owner wins 70%+ of the time.
- NEVER call the championship game "the Finals." Slingshot Bowl only.
- NEVER state or imply an owner's age.
- NEVER mention keeper mechanics.
- Only reference other owners by name if they appear in the data above. Do not invent matchup history.
- The .06 Bowl: Scott won, Mike lost. Never reverse this.
- Bronze Franz = last place = bad. Hot dog costume punishment. Never treat it as an honor.
- Hottest Team in Sports Bowl = performance award for best consolation scorer. Not a culture award.
- The 2026 championship case must be specific to this owner's arc and data. Do not rely on cycles, patterns, or "due factor."

STYLE RULES:
- Do NOT open with "There exists a particular type/species/archetype/breed."
- Do NOT compare this owner to a car, truck, or any vehicle.
- Do NOT use Kyle as the default reference point for every owner. Kyle may appear naturally when genuinely relevant — championship matchups, direct H2H dominance, specific lore — but he should not anchor every dossier.
- "Perfected the art of" is allowed but use sparingly — at most once per report.
- Vary which stats you lead with. Weekly high scores, point share, earnings, playoff record, specific seasons, and trophy history often tell better stories than boom/bust rates alone.
- League lore and owner details are texture. One specific well-placed detail beats five generic ones.

OUTPUT FORMAT:
Return a JSON object with exactly two keys:
- "pullQuote": A single punchy sentence (in quotes) capturing this owner's essence. Dry, memorable, specific. Under 25 words.
- "report": 3 paragraphs of flowing Klosterman-voice prose. No bullet points. No headers. Each paragraph separated by a newline. Final paragraph must address 2026 per the tone instructions above.

Return only valid JSON. No markdown fences. No preamble.`;
}
let activeTone = 'analytical';
function setTone(tone) {
  activeTone = tone;
  ['analytical','ruthless','eulogy'].forEach(t => {
    const btn = document.getElementById('tone' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.classList.toggle('active', t === tone);
  });
}

async function pullDossier() {
  const btn = document.getElementById('pullFileBtn');
  const panel = document.getElementById('dossierPanel');
  const loading = document.getElementById('dossierLoading');
  const report = document.getElementById('dossierReport');
  const statusEl = document.getElementById('dossierLoadingStatus');

  const p = allOwners[OWNER_ID];
  if (!p) return;

  // Show loading state
  btn.disabled = true;
  btn.textContent = 'Generating...';
  panel.classList.add('visible');
  loading.style.display = 'block';
  report.style.display = 'none';
  report.innerHTML = '';

  // Cycle loading phrases
  let phraseIdx = 0;
  statusEl.textContent = DOSSIER_LOADING_PHRASES[0];
  clearInterval(dossierPhraseInterval);
  dossierPhraseInterval = setInterval(() => {
    phraseIdx = (phraseIdx + 1) % DOSSIER_LOADING_PHRASES.length;
    statusEl.textContent = DOSSIER_LOADING_PHRASES[phraseIdx];
  }, 1800);

  try {
    const response = await fetch('https://slinshot-dossier.jack-b-corcoran.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildDossierPrompt(p, activeTone) }]
      })
    });

    const data = await response.json();
    const raw = data.content && data.content[0] && data.content[0].text;
    if (!raw) throw new Error('No response content');

    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    const paragraphs = parsed.report
      .split('\n')
      .filter(s => s.trim())
      .map(s => `<p>${s.trim()}</p>`)
      .join('');

    clearInterval(dossierPhraseInterval);
    loading.style.display = 'none';
    report.innerHTML = `
      <div class="dossier-pull-quote">
        <p>"${parsed.pullQuote}"</p>
      </div>
      <div class="dossier-body">${paragraphs}</div>
        <div class="dossier-footer">
        <button class="gen-again-btn" onclick="pullDossier()">↻ Generate Again</button>
        <span class="dossier-disclaimer">AI-Generated · May contain uncomfortable truths</span>
      </div>
    `;
    report.style.display = 'block';

  } catch (err) {
    clearInterval(dossierPhraseInterval);
    loading.style.display = 'none';
    report.innerHTML = `<div class="dossier-error">Failed to retrieve file. Try again.<br><button class="gen-again-btn" style="margin-top:12px" onclick="pullDossier()">↻ Retry</button></div>`;
    report.style.display = 'block';
    console.error('Dossier error:', err);
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><path d="M3 2h7l3 3v9H3V2z" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/><path d="M5 8h6M5 11h4" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/></svg> Scout ${allOwners[OWNER_ID] ? allOwners[OWNER_ID].name : 'Owner'}`;
}

// ── CHARTS ──
function initCharts(p) {
  const c = p.charts;
  const labels = c.winsAndFinish.years.map(y => "'" + String(y).slice(2));
  const wfWins = c.winsAndFinish.wins;
  const wfFinish = c.winsAndFinish.finish;
  const psRaw = c.pointShare.values;
  const psData = psRaw.map(v => {
    if (v == null) return null;
    const num = parseFloat(v);
    return parseFloat((num < 1 ? num * 100 : num).toFixed(2));
  });
  const wData = c.winnings.values;
  const prData = c.prestigePerSeason.values;
  const prAvg = (() => {
    const valid = prData.filter(v => v != null && v > 0);
    return valid.length ? parseFloat((valid.reduce((a,b) => a+b, 0) / valid.length).toFixed(1)) : 0;
  })();

  const tooltipDefaults = {
    backgroundColor: '#1a1a1a',
    borderColor: '#2a2a2a',
    borderWidth: 1,
    titleColor: '#c9a84c',
    bodyColor: '#d0d0d0',
    titleFont: { family: 'Barlow Condensed', size: 14, weight: 'bold' },
    bodyFont: { family: 'Barlow Condensed', size: 16, weight: 'bold' },
    padding: 10,
    displayColors: false
  };

  const scaleX = {
    grid: { color: 'rgba(255,255,255,0.04)' },
    ticks: { color: '#d8d8d8', font: { family: 'Barlow Condensed', size: 14 } },
    border: { color: '#2a2a2a' }
  };

  const scaleY = {
    grid: { color: 'rgba(255,255,255,0.06)', borderDash: [4,4] },
    ticks: { color: '#d8d8d8', font: { family: 'Barlow Condensed', size: 14 } },
    border: { color: '#2a2a2a' }
  };

  const animOpts = { duration: 1000, easing: 'easeInOutQuart' };
  const interactionOpts = { mode: 'nearest', intersect: false, axis: 'x' };

  function trendLine(data) {
    const clean = data.filter(v => v !== null);
    if (clean.length < 2) return data.map(() => null);
    const n = data.length;
    const xMean = (n - 1) / 2;
    const yMean = data.reduce((a, b) => a + (b || 0), 0) / n;
    let num = 0, den = 0;
    data.forEach((y, x) => { if (y !== null) { num += (x - xMean) * (y - yMean); den += (x - xMean) ** 2; } });
    const slope = den ? num / den : 0;
    const intercept = yMean - slope * xMean;
    return data.map((_, x) => parseFloat((slope * x + intercept).toFixed(2)));
  }

  const chartBuilders = {};
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && chartBuilders[entry.target.id]) {
        chartBuilders[entry.target.id]();
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });

  function registerChart(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    chartBuilders[id] = fn;
    observer.observe(el);
  }

  // Combined wins + finish
  registerChart('combinedChart', () => new Chart(document.getElementById('combinedChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Wins', data: wfWins, borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.06)', fill: true, pointBackgroundColor: '#f97316', borderWidth: 2, yAxisID: 'yWins', order: 2, tension: 0.3 },
        { label: 'Finish', data: wfFinish, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.04)', fill: false, pointBackgroundColor: '#60a5fa', borderWidth: 2, yAxisID: 'yFinish', order: 1, tension: 0.3 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 36, right: 8 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, callbacks: { title: i => i[0].label, label: i => i.dataset.label + ': ' + i.formattedValue } } },
      scales: {
        x: scaleX,
        yWins: { ...scaleY, type: 'linear', position: 'left', min: -0.5, max: 15, ticks: { ...scaleY.ticks, stepSize: 2, color: '#f97316', callback: v => (Number.isInteger(v) && v >= 0 && v <= 14) ? v : '' }, title: { display: false } },
        yFinish: { ...scaleY, type: 'linear', position: 'right', min: 0, max: 15, reverse: true, grid: { drawOnChartArea: false }, ticks: { ...scaleY.ticks, stepSize: 2, color: '#60a5fa', callback: v => (Number.isInteger(v) && v >= 1 && v <= 14) ? v : '' }, title: { display: false } }      },
      elements: { point: { radius: 4, hoverRadius: 6 }, line: { tension: 0.3 } }
    }
  }));

  // Point share
  const PS_LEAGUE_AVG = 7.14;
  registerChart('pointShareChart', () => new Chart(document.getElementById('pointShareChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Point Share', data: psData, borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.08)', fill: true, pointBackgroundColor: '#f97316', borderWidth: 2, tension: 0.3, order: 2 },
        { label: 'League Avg', data: psData.map(v => v != null ? PS_LEAGUE_AVG : null), borderColor: '#e0e0e0', borderDash: [6,4], borderWidth: 2.5, pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, filter: i => i.datasetIndex === 0, callbacks: { title: i => i[0].label, label: i => i.parsed.y.toFixed(2) + '%' } } },
      scales: { x: scaleX, y: { ...scaleY, min: 5, max: 10, ticks: { ...scaleY.ticks, callback: v => v + '%' } } },      elements: { point: { radius: 4, hoverRadius: 6, backgroundColor: '#f97316', borderColor: '#f97316' }, line: { tension: 0.3 } }
    }
  }));

  // Winnings (bar)
  registerChart('winningsChart', () => new Chart(document.getElementById('winningsChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Winnings', data: wData, backgroundColor: wData.map(v => v != null && v > 0 ? 'rgba(249,115,22,0.75)' : 'rgba(170,85,85,0.6)'), borderColor: wData.map(v => v != null && v > 0 ? '#f97316' : '#aa5555'), borderWidth: 1, borderRadius: 3 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, callbacks: { title: i => i[0].label, label: i => '$' + i.parsed.y.toLocaleString() } } },
      scales: { x: scaleX, y: { ...scaleY, ticks: { ...scaleY.ticks, stepSize: 50, callback: v => '$' + v } } }
    }
  }));

  // Prestige per season bar
  const prestigeAvgEl = document.getElementById('prestigeAvgLabel');
  if (prestigeAvgEl && prAvg) prestigeAvgEl.textContent = 'Career Avg (' + Math.round(prAvg) + ' pts)';

  registerChart('prestigeChart', () => new Chart(document.getElementById('prestigeChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Points', data: prData, backgroundColor: prData.map(v => v != null && v > 0 && v >= prAvg ? 'rgba(201,168,76,0.85)' : 'rgba(201,168,76,0.35)'), borderColor: prData.map(v => v != null && v > 0 && v >= prAvg ? '#c9a84c' : 'rgba(201,168,76,0.5)'), borderWidth: 1, borderRadius: 3, order: 2 },
        { label: 'Career Avg', data: prData.map(v => v != null && v > 0 ? prAvg : null), type: 'line', borderColor: '#e0e0e0', borderDash: [6,4], borderWidth: 2.5, pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: {
      animation: animOpts, interaction: interactionOpts, responsive: true, layout: { padding: { top: 12 } },
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, filter: i => i.datasetIndex === 0, callbacks: { title: i => i[0].label, label: i => i.parsed.y + ' pts' } } },
      scales: { x: scaleX, y: { ...scaleY, min: 0, ticks: { ...scaleY.ticks, stepSize: 50 } } }
    }
  }));
}
</script>
