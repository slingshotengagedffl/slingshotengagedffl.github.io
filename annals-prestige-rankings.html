  <style>
    :root {
      --red: #c0392b;
      --red-bright: #e74c3c;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --surface3: #242424;
      --text: #f0f0f0;
      --muted: #555;
      --border: #2a2a2a;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --playoff-color: #3498db;
      --regseason-color: #27ae60;
      --consolation-color: #8e44ad;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── Page Header ── */
    .page-header {
      padding: 40px 20px 0;
      text-align: center;
    }
    .page-supertitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      color: var(--red-bright);
      letter-spacing: 0.06em;
      line-height: 1;
    }

    /* ── Explainer ── */
    .explainer {
      max-width: 640px;
      margin: 16px auto 0;
      padding: 0 16px;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    /* ── Legend ── */
    .legend {
      max-width: 640px;
      margin: 12px auto 0;
      padding: 0 16px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-dot.active   { background: var(--gold); }
    .legend-dot.inactive { background: var(--muted); opacity: 0.5; }

    /* ── Rankings list ── */
    .rankings-wrap {
      max-width: 640px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }

    /* ── Owner row ── */
    .owner-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .owner-row.active-owner { border-color: var(--gold); }
    .owner-row.inactive-owner { border-color: var(--border); }
    .owner-row.open { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }

    .owner-row-main {
      display: grid;
      grid-template-columns: 44px 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .owner-row-main:hover { background: var(--surface2); }

    /* ── Rank number ── */
    .rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1;
    }
    .rank-1, .rank-2, .rank-3, .rank-other { color: #888; }

    /* ── Owner name + bar ── */
    .owner-info { min-width: 0; }
    .owner-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 5px;
    }
    .active-owner .owner-name { color: var(--text); }
    .inactive-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 6px;
      vertical-align: middle;
    }
    .prestige-bar-wrap {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }
    .prestige-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gold);
      transition: width 0.6s ease;
    }
    .inactive-owner .prestige-bar-fill { background: var(--muted); }

    /* ── Points ── */
    .owner-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-align: right;
      white-space: nowrap;
    }
    .inactive-owner .owner-pts { color: var(--muted); }

    /* ── Chevron ── */
    .chevron {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.25s;
      margin-left: 4px;
    }
    .owner-row.open .chevron { transform: rotate(180deg); }

    /* ── Dashboard ── */
    .owner-dashboard {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
      background: var(--surface2);
      flex-direction: column;
      gap: 16px;
    }
    .owner-row.open .owner-dashboard { display: flex; }

    /* ── Dashboard sections ── */
    .dash-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Points breakdown bar */
    .breakdown-bar {
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
    }
    .breakdown-segment { height: 100%; transition: width 0.5s ease; }
    .seg-playoff     { background: var(--playoff-color); }
    .seg-regseason   { background: var(--regseason-color); }
    .seg-consolation { background: var(--consolation-color); }

    .breakdown-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .breakdown-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
    }
    .breakdown-legend-dot {
      width: 8px; height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Top seasons */
    .top-seasons {
      display: flex;
      gap: 8px;
    }
    .season-card {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      text-align: center;
    }
    .season-year {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--gold);
    }
    .season-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 2px;
    }
    .season-note {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.3;
      font-style: italic;
    }

    /* ── Top factor ── */
    .top-factor-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 12px;
    }
    .top-factor-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .top-factor-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--gold);
      flex: 1;
    }
    .top-factor-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--text);
      white-space: nowrap;
    }

    /* Move up scenario */
    .move-up-box {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red-bright);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .move-up-text {
      font-family: 'Barlow', sans-serif;
      font-size: 0.83rem;
      color: #bbb;
      line-height: 1.5;
    }

    .move-up-na {
      font-family: 'Barlow', sans-serif;
      font-size: 0.83rem;
      color: var(--muted);
      font-style: italic;
    }

</head>

  function rankSuffix(n) {
    if (n === 1) return '1st';
    if (n === 2) return '2nd';
    if (n === 3) return '3rd';
    return `${n}th`;
  }

  function rankClass(n) {
    if (n === 1) return 'rank-1';
    if (n === 2) return 'rank-2';
    if (n === 3) return 'rank-3';
    return 'rank-other';
  }

      <div class="breakdown-legend">
        <div class="breakdown-legend-item"><div class="breakdown-legend-dot" style="background:var(--playoff-color)"></div> Playoffs ${b.playoff}%</div>
        <div class="breakdown-legend-item"><div class="breakdown-legend-dot" style="background:var(--regseason-color)"></div> Reg Season ${b.regseason}%</div>
        <div class="breakdown-legend-item"><div class="breakdown-legend-dot" style="background:var(--consolation-color)"></div> Consolation ${b.consolation}%</div>
      </div>
    `;
  }

  function buildTopFactor(tf) {
    if (!tf || tf.pts === 0) return `
      <div class="top-factor-box">
        <span class="top-factor-label">Top Factor</span>
        <span class="top-factor-name" style="color:var(--muted)">No points yet</span>
      </div>`;
    return `
      <div class="top-factor-box">
        <span class="top-factor-label">Top Factor</span>
        <span class="top-factor-name">${tf.name}</span>
        <span class="top-factor-pts">${tf.pts} pts</span>
      </div>`;
  }

  function buildTopSeasons(seasons) {
    if (!seasons.length) return '<div style="color:var(--muted);font-size:0.82rem;font-style:italic">No seasons yet</div>';
    return `<div class="top-seasons">
      ${seasons.map(s => `
        <div class="season-card">
          <div class="season-year">${s.year}</div>
          <div class="season-pts">${s.pts} pts</div>
          <div class="season-note">${s.note}</div>
        </div>
      `).join('')}
    </div>`;
  }

  function buildMoveUp(text, rank) {
    if (rank === 1) return `<div class="move-up-na">Sitting at #1. No one to chase.</div>`;
    if (!text) return `<div class="move-up-na">No longer active — ranking is locked in history.</div>`;
    return `<div class="move-up-text">${text}</div>`;
  }

  function toggleRow(idx) {
    const row = document.getElementById(`row-${idx}`);
    row.classList.toggle('open');
  }

  const wrap = document.getElementById('rankingsWrap');

  OWNERS.forEach((owner, idx) => {
    const rank = idx + 1;
    const barWidth = maxPts > 0 ? (owner.pts / maxPts * 100).toFixed(1) : 0;
    const activeClass = owner.active ? 'active-owner' : 'inactive-owner';
    const inactiveLabel = owner.active ? '' : '<span class="inactive-label">Retired</span>';

    const row = document.createElement('div');
    row.className = `owner-row ${activeClass}`;
    row.id = `row-${idx}`;

    row.innerHTML = `
      <div class="owner-row-main" onclick="toggleRow(${idx})">
        <div class="rank-num ${rankClass(rank)}">${rank}</div>
        <div class="owner-info">
          <div class="owner-name">${owner.name}${inactiveLabel}</div>
          <div class="prestige-bar-wrap">
            <div class="prestige-bar-fill" style="width:${barWidth}%"></div>
          </div>
        </div>
        <div class="owner-pts">${owner.pts.toLocaleString()}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="owner-dashboard">
        <div>
          <div class="dash-section-title">Points Breakdown</div>
          ${buildBreakdownBar(owner.breakdown)}
          ${buildTopFactor(owner.topFactor)}
        </div>
        <div>
          <div class="dash-section-title">Top Seasons</div>
          ${buildTopSeasons(owner.topSeasons)}
        </div>
        <div>
          <div class="dash-section-title">📈 Path to Moving Up</div>
          <div class="move-up-box">
            ${buildMoveUp(owner.moveUp, rank)}
          </div>
        </div>
      </div>
    `;

    wrap.appendChild(row);
  });
  </script>
</body>
</html>
