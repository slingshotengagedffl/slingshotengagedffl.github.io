<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beefcakes · Slingshot Engaged</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #bbb;
    --label: #d8d8d8;
    --text-body: #e8e8e8;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --red-dark: #a82d1f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    text-align: center;
    padding: 36px 20px 16px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 0.08em;
    color: var(--red-bright);
    text-transform: uppercase;
  }

  .page-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── CHARACTER GRID ── */
  .grid-wrapper {
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .character-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    border: 1px solid var(--border);
    background: var(--border);
  }

  .character-card {
    position: relative;
    aspect-ratio: 1/1;
    background: var(--bg3);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s, filter 0.15s;
  }

  .character-card:hover {
    filter: brightness(1.15);
    transform: scale(1.02);
    z-index: 2;
  }

  .character-card:active {
    transform: scale(0.98);
  }

  /* red border flash on hover like SF select screen */
  .character-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    pointer-events: none;
    z-index: 3;
  }
  .character-card:hover::after {
    border-color: var(--red-bright);
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* placeholder when no image */
  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-placeholder-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-name-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
    padding: 24px 12px 10px;
    z-index: 2;
    text-align: center;
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 400;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transform: scale(0.94);
    transition: transform 0.2s;
    position: relative;
    margin: auto;
  }
  .modal-overlay.open .modal {
    transform: scale(1);
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,0,0.7);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--red); }

  .modal-img-wrap {
    width: 100%;
    aspect-ratio: 1/1;
    background: var(--bg3);
    overflow: hidden;
  }

  .modal-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .modal-placeholder-img {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
  }

  .modal-placeholder-img span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .modal-body {
    padding: 20px 18px 22px;
  }

  .modal-name-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 1;
  }

  .modal-location {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 6px;
  }

  .modal-nickname {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: var(--red-bright);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 10px 8px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-top: 4px;
    line-height: 1.2;
  }

  .modal-profile-btn {
    display: block;
    width: 100%;
    background: var(--red);
    border: none;
    padding: 14px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.14em;
    color: #fff;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, filter 0.15s;
  }
  .modal-profile-btn:hover {
    background: var(--red-bright);
    filter: brightness(1.1);
  }

</style>
</head>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap" id="modalImgWrap"></div>
    <div class="modal-body">
      <div class="modal-name-row">

        <div class="modal-location" id="modalLocation"></div>

    alex:   { name: 'Alex',   nickname: '"AVL"',            location: '❄️ Minnesota',      rank: '#5',  since: '2016', trophies: '1', img: 'images/alex.jpg',   profile: 'profiles/alex.html' },

    dylan:  { name: 'Dylan',  nickname: '"Dyl"',            location: '🦀 Maryland',       rank: '#1',  since: '2015', trophies: '3', img: 'images/dylan.jpg',  profile: 'profiles/dylan.html' },
    jack:   { name: 'Jack',   nickname: '"The Commish"',    location: '🌴 California',     rank: '#2',  since: '2014', trophies: '2', img: 'images/jack.jpg',   profile: 'profiles/jack.html' },
    jordan: { name: 'Jordan', nickname: '"JopO"',           location: '🌲 North Carolina', rank: '#17', since: '2019', trophies: '0', img: 'images/jordan.jpg', profile: 'profiles/jordan.html' },
    kyle:   { name: 'Kyle',   nickname: '"The Snoot"',      location: '🏔️ Colorado',       rank: '#3',  since: '2018', trophies: '2', img: 'images/kyle.png',   profile: 'profiles/kyle.html' },

    mike:   { name: 'Mike',   nickname: '"The Contrarian"', location: '🔔 Pennsylvania',   rank: '#4',  since: '2014', trophies: '1', img: 'images/mike.jpg',   profile: 'profiles/mike.html' },
    scott:  { name: 'Scott',  nickname: '"Murph"',          location: '🌴 California',     rank: '#11', since: '2014', trophies: '0', img: 'images/scott.jpg',  profile: 'profiles/scott.html' },
    tim:    { name: 'Tim',    nickname: '"Hot Tim"',        location: '🏔️ Colorado',       rank: '#15', since: '2020', trophies: '0', img: 'images/tim.jpg',    profile: 'profiles/tim.html' },
    wade:   { name: 'Wade',   nickname: '"Bathhouse"',      location: '🔔 Pennsylvania',   rank: '#14', since: '2020', trophies: '0', img: 'images/wade.jpg',   profile: 'profiles/wade.html' },
  };

  // ── MODAL ──
  function openModal(key) {
    const b = beefcakes[key];
    if (!b) return;

    // image
    const wrap = document.getElementById('modalImgWrap');
    wrap.innerHTML = '';
    const img = document.createElement('img');
    img.className = 'modal-img';
    img.alt = b.name;
    img.src = b.img;
    img.onerror = function() {
      wrap.innerHTML = '<div class="modal-placeholder-img"><span>' + b.name + '</span></div>';
    };
    wrap.appendChild(img);

    document.getElementById('modalName').textContent = b.name;
    document.getElementById('modalLocation').textContent = b.location;
    document.getElementById('modalNickname').textContent = b.nickname;
    document.getElementById('statRank').textContent = b.rank;
    document.getElementById('statSince').textContent = b.since;
    document.getElementById('statTrophies').textContent = b.trophies;
    document.getElementById('modalProfileBtn').href = b.profile;

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
</script>
