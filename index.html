<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slingshot Engaged</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #bbb;
    --label: #d8d8d8;
    --text-body: #e8e8e8;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --red-dark: #a82d1f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 10px;
  }

  .hero-pair {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 16px;
    width: 100%;
    max-width: 500px;
    height: 240px;
  }

  .hero-logo {
    height: 100%;
    width: auto;
    max-width: 50%;
    object-fit: contain;
    object-position: bottom;
  }

  .hero-dylan {
    height: 100%;
    width: auto;
    max-width: 50%;
    object-fit: contain;
    object-position: bottom;
  }

  /* ── ACTION GRID ── */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 900px;
    padding: 20px 16px;
    margin: 0 auto;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: filter 0.15s, transform 0.15s;
  }
  .action-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }

  .action-btn.red { background: var(--red); border: 1px solid rgba(255,255,255,0.1); }
  .action-btn.dark { background: #2e2e2e; border: 1px solid #444444; }

  .action-btn-emoji { font-size: 1.5rem; flex-shrink: 0; }

  .action-btn-label {
    font-family: 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
  }



  /* ── LEAGUE NOTE ── */
  .league-note-section {
    padding: 30px 16px 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .league-note-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .league-note-title {
    font-family: 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: 2.2rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }

  .league-note-week {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red-bright);
  }

  .league-note-body {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 24px;
  }

  .league-note-placeholder {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .league-note-text {
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-body);
  }
  .league-note-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em; color: #fff; margin: 8px 0 4px; }
  .league-note-text h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.06em; color: var(--red-bright); margin: 6px 0 4px; }
  .league-note-text p { margin: 6px 0; }
  .league-note-text strong { color: #fff; }
  .league-note-text em { color: var(--muted); }
  .league-note-text ul { padding-left: 20px; margin: 6px 0; }
  .league-note-text li { margin: 3px 0; }
</style>
</head>
