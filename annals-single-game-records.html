const CAT_LABELS = {
  highScore: "High Score",
  lowScore: "Low Score",
  largestMargin: "Largest Margin",
  smallestMargin: "Smallest Margin",
  highCombined: "High Combined",
  lowCombined: "Low Combined",
  highScoreLoss: "High Score in a Loss",
  lowScoreWin: "Low Score in a Win",
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ownerLink(name) {
  if (ACTIVE.has(name) && PROFILE_MAP[name]) {
    return `<a href="profiles/${PROFILE_MAP[name]}.html">${name}</a>`;
  }
  return name;
}

function roundPill(round) {
  if (!round) return '';
  if (round === 'Slingshot Bowl') return `<span class="round-pill pill-sb">SB</span>`;
  if (round === 'Semifinals') return `<span class="round-pill pill-semi">SF</span>`;
  if (round === 'First Round') return `<span class="round-pill pill-rd1">R1</span>`;
  if (round === 'Consolation') return `<span class="round-pill pill-con">CON</span>`;
  return '';
}

function fmt(val, decimals=2) {
  return val.toFixed(decimals);
}

// ── SPOTLIGHT ─────────────────────────────────────────────────────────────────
let spotIdx = 0;
let spotTimer = null;

function spotlightImgHtml(s) {
  // cat rules: highScore/lowScore/highScoreLoss/lowScoreWin = one image (owner)
  // largestMargin/smallestMargin/highCombined/lowCombined = two images (owner + opp)
  const one = ['highScore','lowScore','highScoreLoss','lowScoreWin'];
  const two = ['largestMargin','smallestMargin','highCombined','lowCombined'];
  function img(name) {
    return ownerAvatar(name, 56);
  }
  if (one.includes(s.cat)) {
    return `<div class="spotlight-images">${img(s.owner)}</div>`;
  }
  if (two.includes(s.cat)) {
    return `<div class="spotlight-images">${img(s.owner)}<span class="spotlight-img-vs">vs</span>${img(s.opp)}</div>`;
  }
  return '';
}

function renderSpotlight(idx) {
  const s = SPOTLIGHTS[idx];
  document.getElementById('spotlightBody').innerHTML = `
    <div class="spotlight-tag">★ Record Spotlight</div>
    ${spotlightImgHtml(s)}
    <div class="spotlight-title">${s.title}</div>
    <div class="spotlight-stat">${s.stat}</div>
    <div class="spotlight-context">${s.context}</div>
    <div class="spotlight-desc">${s.desc}</div>
  `;
  document.querySelectorAll('.spotlight-dot').forEach((d,i) => {
    d.classList.toggle('active', i===idx);
  });
  document.getElementById('spotCounter').textContent = `${idx+1} / ${SPOTLIGHTS.length}`;
}

function initSpotlight() {
  const dots = document.getElementById('spotDots');
  SPOTLIGHTS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'spotlight-dot' + (i===0?' active':'');
    d.addEventListener('click', () => { goSpot(i); });
    dots.appendChild(d);
  });
  renderSpotlight(0);
  startSpotTimer();

  document.getElementById('spotPrev').addEventListener('click', () => goSpot((spotIdx - 1 + SPOTLIGHTS.length) % SPOTLIGHTS.length));
  document.getElementById('spotNext').addEventListener('click', () => goSpot((spotIdx + 1) % SPOTLIGHTS.length));
}

function goSpot(idx) {
  spotIdx = idx;
  renderSpotlight(spotIdx);
  clearInterval(spotTimer);
  startSpotTimer();
}

function startSpotTimer() {
  spotTimer = setInterval(() => {
    spotIdx = (spotIdx + 1) % SPOTLIGHTS.length;
    renderSpotlight(spotIdx);
  }, 8000);
}

// ── RECORDS RENDER ────────────────────────────────────────────────────────────
function isScoreCategory(cat) {
  return cat === 'highScore' || cat === 'lowScore' || cat === 'highScoreLoss' || cat === 'lowScoreWin';
}

const PHOTO_IDS = {
  'Mike M.': 'mike',
  'Tim H.':  'tim',
  'Alex V.': 'alex',
};

const HAS_PHOTO = new Set(["Jack","Dylan","Brian","Mike M.","Daniel","Jon","Matt","Kyle","Jordan","Tim H.","Wade","Alex V.","Andy","Scott"]);

function ownerAvatar(name, size=44) {
  if (!HAS_PHOTO.has(name)) return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--surface3);flex-shrink:0;"></div>`;
  const id = PHOTO_IDS[name] || name.toLowerCase().replace(/[^a-z]/g,'');
  const style = `width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--gold);flex-shrink:0;`;
  return `<img src="images/${id}.png" onerror="this.onerror=null;this.src='images/${id}.jpg'" style="${style}" alt="${name}">`;
}

function sparkBar(value, maxValue) {
  const pct = maxValue > 0 ? Math.max(4, Math.round((value / maxValue) * 100)) : 4;
  return `<div class="spark-bar-outer"><div class="spark-bar-inner" style="width:${pct}%"></div></div>`;
}

function buildSparkWrap(value, maxValue) {
  return `<div class="spark-wrap">${sparkBar(value, maxValue)}<span class="spark-val">${fmt(value)}</span></div>`;
}

function formatTopName(row, cat) {
  if (isScoreCategory(cat)) {
    // score categories: "Owner vs. Opponent"
    const primary = row.owner || row.winner;
    const secondary = row.opp || row.loser;
    return `${ownerLink(primary)} <span style="font-weight:400;color:var(--muted);">vs.</span> ${ownerLink(secondary)}`;
  } else {
    return `${ownerLink(row.winner)} <span style="font-weight:400;color:var(--muted);">def.</span> ${ownerLink(row.loser)}`;
  }
}

function formatRowName(row, cat) {
  if (isScoreCategory(cat)) {
    return `${ownerLink(row.owner)} <span style="font-weight:400;color:var(--muted);font-size:0.8em;">vs.</span> ${ownerLink(row.opp)}`;
  } else {
    return `${ownerLink(row.winner)} <span style="font-weight:400;color:var(--muted);font-size:0.8em;">def.</span> ${ownerLink(row.loser)}`;
  }
}

function formatValue(row, cat) {
  if (isScoreCategory(cat)) return fmt(row.score);
  return fmt(row.value);
}

function formatTopValue(row, cat) {
  if (isScoreCategory(cat)) return fmt(row.score);
  return fmt(row.value);
}

function formatMeta(row, cat) {
  const context = row.round
    ? `${row.year} · ${row.round}`
    : `${row.year} · Week ${row.week}`;
  if (isScoreCategory(cat)) {
    const res = row.result === 'W' ? 'Won' : 'Lost';
    const oppScore = row.opp_score !== undefined ? ` · Opp: ${fmt(row.opp_score)}` : '';
    return `${context} · ${res}${oppScore}`;
  }
  if (cat === 'largestMargin' || cat === 'smallestMargin') {
    return `${context} · ${fmt(row.wscore)}–${fmt(row.lscore)}`;
  }
  return `${context} · ${fmt(row.wscore)} + ${fmt(row.lscore)}`;
}

function getCardValues(data, cat) {
  // Returns array of numeric values for sparkline scaling
  return data.map(row => isScoreCategory(cat) ? row.score : row.value);
}

function buildCard(section, cat, dataOverride) {
  const data = dataOverride || RECORDS[section][cat];
  const isRS = section === 'regularSeason';
  const isCon = section === 'consolation';
  const badgeClass = isCon ? 'badge-con' : isRS ? 'badge-rs' : 'badge-po';
  const badgeLabel = isCon ? 'Consolation' : isRS ? 'Reg Season' : 'Playoffs';
  const top = data[0];
  const rest = data.slice(1);

  const values = getCardValues(data, cat);
  const maxVal = Math.max(...values);
  const minVal = Math.min(...values);
  // For low-is-better cats, invert bar so worst = shortest
  const lowBetter = cat === 'lowScore' || cat === 'smallestMargin' || cat === 'lowCombined' || cat === 'lowScoreWin';
  function barVal(v) { return lowBetter ? (maxVal - v + minVal) : v; }
  const maxBar = lowBetter ? (maxVal - minVal + minVal) : maxVal;

  const topPill = top.round ? roundPill(top.round) : '';
  const topName = isScoreCategory(cat) ? (top.owner || top.winner) : top.winner;
  const topOpp  = isScoreCategory(cat) ? (top.opp  || top.loser)  : top.loser;
  const singleCats = ['highScore','lowScore','highScoreLoss','lowScoreWin'];
  const topAvatarHtml = singleCats.includes(cat)
    ? ownerAvatar(topName)
    : `<div class="top-avatars">${ownerAvatar(topName, 38)}${ownerAvatar(topOpp, 38)}</div>`;
  const topVal = isScoreCategory(cat) ? top.score : top.value;

  const rowsHtml = rest.map(row => {
    const pill = row.round ? roundPill(row.round) : '';
    const rv = isScoreCategory(cat) ? row.score : row.value;
    return `
      <div class="record-row">
        <div class="rank-num">${row.rank}</div>
        <div class="row-info">
          <div class="row-name">${formatRowName(row, cat)}${pill}</div>
          <div class="row-meta">${formatMeta(row, cat)}</div>
        </div>
        ${buildSparkWrap(rv, maxBar || 1)}
      </div>`;
  }).join('');

  return `
    <div class="record-card" data-section="${section}" data-cat="${cat}">
      <div class="record-card-header">
        <div class="record-card-title">${CAT_LABELS[cat]}</div>
        <span class="record-type-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="record-top">
        ${topAvatarHtml}
        <div class="record-rank-gold">1</div>
        <div class="record-top-info">
          <div class="record-top-name">${formatTopName(top, cat)}${topPill}</div>
          <div class="record-top-meta">${formatMeta(top, cat)}</div>
        </div>
        ${buildSparkWrap(topVal, maxBar || 1)}
      </div>
      <div class="record-rows">${rowsHtml}</div>
    </div>`;
}

function renderRecords() {
  const container = document.getElementById('recordsContainer');
  const cats = ['highScore','lowScore','largestMargin','smallestMargin','highCombined','lowCombined','highScoreLoss','lowScoreWin'];

  let html = '';

  // Regular Season section
  html += `<div class="section-label" id="label-rs">Regular <span>Season</span></div>`;
  html += `<div class="records-grid" id="grid-rs">`;
  cats.forEach(cat => { html += buildCard('regularSeason', cat); });
  html += `</div>`;

  // Playoffs section
  html += `<div class="section-label" id="label-po" style="margin-top:48px;">Playoffs</div>`;
  html += `<div class="records-grid" id="grid-po">`;
  cats.forEach(cat => { html += buildCard('playoffs', cat); });
  html += `</div>`;

  // Consolation section
  html += `<div class="section-label" id="label-con" style="margin-top:48px;">Consolation</div>`;
  html += `<div class="records-grid" id="grid-con">`;
  cats.forEach(cat => { html += buildCard('consolation', cat, RECORDS_CON[cat]); });
  html += `</div>`;

  container.innerHTML = html;

// ── OWNER COMPUTATION ─────────────────────────────────────────────────────────
function getOwnerData(owner, typeFilter) {
  const typeMap = { rs: ['Regular'], po: ['Playoff'], con: ['Consolation'], all: ['Regular','Playoff','Consolation'] };
  const allowed = typeMap[typeFilter] || typeMap.all;

  const filtered = ALL_GAMES.filter(g => allowed.includes(g.t) && (g.a === owner || g.h === owner));

  function ownerScore(g) { return g.a === owner ? g.as : g.hs; }
  function oppScore(g)   { return g.a === owner ? g.hs : g.as; }
  function oppName(g)    { return g.a === owner ? g.h  : g.a;  }
  function won(g)        { return ownerScore(g) > oppScore(g); }
  function winner(g)     { return won(g) ? owner : oppName(g); }
  function loser(g)      { return won(g) ? oppName(g) : owner; }
  function wscore(g)     { return won(g) ? ownerScore(g) : oppScore(g); }
  function lscore(g)     { return won(g) ? oppScore(g) : ownerScore(g); }

  function toScoreRow(g, rank, result) {
    return { rank, owner, opp: oppName(g), score: ownerScore(g), opp_score: oppScore(g),
             year: g.y, week: g.w, type: g.t, round: g.r, result };
  }
  function toGameRow(g, rank, col) {
    return { rank, winner: winner(g), loser: loser(g), wscore: wscore(g), lscore: lscore(g),
             value: col === 'margin' ? g.mar : g.tot,
             year: g.y, week: g.w, type: g.t, round: g.r };
  }

  const sorted = (arr, fn, asc) => [...arr].sort((a,b) => asc ? fn(a)-fn(b) : fn(b)-fn(a));

  return {
    highScore:     sorted(filtered, ownerScore, false).slice(0,10).map((g,i) => toScoreRow(g, i+1, won(g)?'W':'L')),
    lowScore:      sorted(filtered, ownerScore, true).slice(0,10).map((g,i) => toScoreRow(g, i+1, won(g)?'W':'L')),
    largestMargin: sorted(filtered, g=>g.mar, false).slice(0,10).map((g,i) => toGameRow(g, i+1, 'margin')),
    smallestMargin:sorted(filtered, g=>g.mar, true).slice(0,10).map((g,i) => toGameRow(g, i+1, 'margin')),
    highCombined:  sorted(filtered, g=>g.tot, false).slice(0,10).map((g,i) => toGameRow(g, i+1, 'total')),
    lowCombined:   sorted(filtered, g=>g.tot, true).slice(0,10).map((g,i) => toGameRow(g, i+1, 'total')),
    highScoreLoss: sorted(filtered.filter(g=>!won(g)), ownerScore, false).slice(0,10).map((g,i) => toScoreRow(g, i+1, 'L')),
    lowScoreWin:   sorted(filtered.filter(g=>won(g)), ownerScore, true).slice(0,10).map((g,i) => toScoreRow(g, i+1, 'W')),
  };
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
let activeType = 'all';
let activeCat = 'all';
let activeOwners = new Set(); // empty = all owners (league mode)

function isOwnerMode() { return activeOwners.size > 0; }

// Rebuild card contents for owner mode
function buildOwnerCard(section, cat, data) {
  const isRS = section === 'regularSeason';
  const isCon = section === 'consolation';
  const badgeClass = isCon ? 'badge-con' : isRS ? 'badge-rs' : 'badge-po';
  const badgeLabel = isCon ? 'Consolation' : isRS ? 'Reg Season' : 'Playoffs';

  if (!data || data.length === 0) {
    return `<div class="record-card" data-section="${section}" data-cat="${cat}">
      <div class="record-card-header">
        <div class="record-card-title">${CAT_LABELS[cat]}</div>
        <span class="record-type-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="no-results">No games found</div>
    </div>`;
  }

  const top = data[0];
  const rest = data.slice(1);
  const topPill = top.round ? roundPill(top.round) : '';
  const topName = isScoreCategory(cat) ? (top.owner || top.winner) : top.winner;
  const topOpp  = isScoreCategory(cat) ? (top.opp  || top.loser)  : top.loser;
  const singleCats = ['highScore','lowScore','highScoreLoss','lowScoreWin'];
  const topAvatarHtml = singleCats.includes(cat)
    ? ownerAvatar(topName)
    : `<div class="top-avatars">${ownerAvatar(topName, 38)}${ownerAvatar(topOpp, 38)}</div>`;

  const values = data.map(row => isScoreCategory(cat) ? row.score : row.value);
  const maxVal = Math.max(...values);
  const minVal = Math.min(...values);
  const lowBetter = cat === 'lowScore' || cat === 'smallestMargin' || cat === 'lowCombined' || cat === 'lowScoreWin';
  function barVal(v) { return lowBetter ? (maxVal - v + minVal) : v; }
  const maxBar = lowBetter ? (maxVal - minVal + minVal) : maxVal;
  const topVal = isScoreCategory(cat) ? top.score : top.value;

  const rowsHtml = rest.map(row => {
    const pill = row.round ? roundPill(row.round) : '';
    const rv = isScoreCategory(cat) ? row.score : row.value;
    return `<div class="record-row">
      <div class="rank-num">${row.rank}</div>
      <div class="row-info">
        <div class="row-name">${formatRowName(row, cat)}${pill}</div>
        <div class="row-meta">${formatMeta(row, cat)}</div>
      </div>
      ${buildSparkWrap(rv, maxBar || 1)}
    </div>`;
  }).join('');

  return `<div class="record-card" data-section="${section}" data-cat="${cat}">
    <div class="record-card-header">
      <div class="record-card-title">${CAT_LABELS[cat]}</div>
      <span class="record-type-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="record-top">
      ${topAvatarHtml}
      <div class="record-rank-gold">1</div>
      <div class="record-top-info">
        <div class="record-top-name">${formatTopName(top, cat)}${topPill}</div>
        <div class="record-top-meta">${formatMeta(top, cat)}</div>
      </div>
      ${buildSparkWrap(topVal, maxBar || 1)}
    </div>
    <div class="record-rows">${rowsHtml}</div>
  </div>`;
}

function applyFilters() {
  const cats = ['highScore','lowScore','largestMargin','smallestMargin','highCombined','lowCombined','highScoreLoss','lowScoreWin'];
  const catFilter = activeCat;
  const typeFilter = activeType;

  if (isOwnerMode()) {
    // Owner mode: merge data from all selected owners, re-sort, take top 10
    const sectionMap = {
      regularSeason: { types: ['Regular'], label: 'rs' },
      playoffs:      { types: ['Playoff'], label: 'po' },
      consolation:   { types: ['Consolation'], label: 'con' },
    };

    const sections = typeFilter === 'all' ? ['regularSeason','playoffs','consolation']
      : typeFilter === 'rs' ? ['regularSeason']
      : typeFilter === 'po' ? ['playoffs']
      : ['consolation'];

    // For each section, rebuild all cards from owner data
    ['regularSeason','playoffs','consolation'].forEach(sec => {
      const grid = document.getElementById(`grid-${sectionMap[sec].label}`);
      const label = document.getElementById(`label-${sectionMap[sec].label}`);
      if (!sections.includes(sec)) {
        if (label) label.style.display = 'none';
        if (grid) grid.style.display = 'none';
        return;
      }
      if (label) label.style.display = '';
      if (grid) grid.style.display = '';

      const typeKey = sectionMap[sec].types[0] === 'Regular' ? 'rs'
        : sectionMap[sec].types[0] === 'Playoff' ? 'po' : 'con';

      // Merge games from all selected owners for this section type
      const mergedGames = ALL_GAMES.filter(g => sectionMap[sec].types.includes(g.t));

      // For each cat, merge top-10 from each owner then re-sort
      const catsToRender = catFilter === 'all' ? cats : [catFilter];
      let html = '';
      cats.forEach(cat => {
        if (catFilter !== 'all' && cat !== catFilter) {
          // render hidden placeholder so DOM stays stable
          html += `<div class="record-card hidden" data-section="${sec}" data-cat="${cat}"></div>`;
          return;
        }

        // Collect all rows from selected owners
        let allRows = [];
        activeOwners.forEach(owner => {
          const ownerGames = mergedGames.filter(g => g.a === owner || g.h === owner);
          const ownerData = getOwnerData(owner, typeKey);
          if (ownerData[cat]) allRows = allRows.concat(ownerData[cat]);
        });

        // De-duplicate by game (year+week+type+both names) and re-sort
        const seen = new Set();
        allRows = allRows.filter(row => {
          const key = isScoreCategory(cat)
            ? `${row.year}-${row.week}-${row.type}-${row.owner}-${row.opp}`
            : `${row.year}-${row.week}-${row.type}-${row.winner}-${row.loser}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });

        // Re-sort
        if (cat === 'highScore' || cat === 'highScoreLoss') allRows.sort((a,b) => b.score - a.score);
        else if (cat === 'lowScore' || cat === 'lowScoreWin') allRows.sort((a,b) => a.score - b.score);
        else if (cat === 'largestMargin') allRows.sort((a,b) => b.value - a.value);
        else if (cat === 'smallestMargin') allRows.sort((a,b) => a.value - b.value);
        else if (cat === 'highCombined') allRows.sort((a,b) => b.value - a.value);
        else if (cat === 'lowCombined') allRows.sort((a,b) => a.value - b.value);

        allRows = allRows.slice(0,10).map((r,i) => ({...r, rank: i+1}));
        html += buildOwnerCard(sec, cat, allRows);
      });

      if (grid) grid.innerHTML = html;
    });

  } else {
    // League mode: restore original cards, apply type+cat visibility
    renderRecords();
    document.querySelectorAll('.record-card').forEach(card => {
      const sec = card.dataset.section;
      const cat = card.dataset.cat;
      const typeMatch = typeFilter === 'all'
        || (typeFilter === 'rs' && sec === 'regularSeason')
        || (typeFilter === 'po' && sec === 'playoffs')
        || (typeFilter === 'con' && sec === 'consolation');
      const catMatch = catFilter === 'all' || catFilter === cat;
      card.classList.toggle('hidden', !(typeMatch && catMatch));
    });

    [['rs','regularSeason'],['po','playoffs'],['con','consolation']].forEach(([key, sec]) => {
      const visible = document.querySelectorAll(`[data-section="${sec}"]:not(.hidden)`).length > 0;
      const label = document.getElementById(`label-${key}`);
      const grid = document.getElementById(`grid-${key}`);
      if (label) label.style.display = visible ? '' : 'none';
      if (grid) { grid.style.display = visible ? '' : 'none'; grid.style.marginTop = ''; }
    });
  }
}

function initFilters() {
  document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      applyFilters();
    });
  });

  document.querySelectorAll('#catFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      applyFilters();
    });
  });

  document.querySelectorAll('#ownerFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const owner = btn.dataset.owner;
      if (owner === 'all') {
        activeOwners.clear();
        document.querySelectorAll('#ownerFilters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      } else {
        // deselect "All Owners"
        document.querySelector('#ownerFilters [data-owner="all"]').classList.remove('active');
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
          activeOwners.add(owner);
        } else {
          activeOwners.delete(owner);
        }
        // if nothing selected, revert to all
        if (activeOwners.size === 0) {
          document.querySelector('#ownerFilters [data-owner="all"]').classList.add('active');
        }
      }
      applyFilters();
    });
  });
}
